# ============================================================
#  SonarCloud / SonarQube — M5Stack Core Framework
# ============================================================
#  This project is ESP32 firmware (Arduino / ESP-IDF) for a
#  microcontroller.  A few SonarSource C++ "modernization" rules
#  assume a hosted desktop/server runtime and are NOT valid on a
#  freestanding MCU target — they are suppressed below.  Rationale
#  is documented in CODE_AUDIT_LATEST.md; in short:
#
#    • snprintf -> std::format / std::format_to_n
#        std::format drags in heavy, exception-throwing formatting
#        machinery (flash + transient RAM).  Bounded snprintf into a
#        fixed stack buffer is the correct, safe embedded idiom, and
#        every call here already passes sizeof(buf).
#
#    • strftime -> std::chrono
#        C++20 std::chrono calendar formatting depends on the IANA
#        time-zone database loaded from a filesystem — which does not
#        exist on a microcontroller.  The C time API (struct tm /
#        strftime / getLocalTime) is what integrates with ESP-IDF
#        SNTP and the battery-backed hardware RTC; NTP_TZ is already a
#        POSIX TZ string.
#
#    • C-style char array -> std::string
#        Fixed char[] buffers are deliberate: stack-allocated, no heap
#        churn or fragmentation on a long-running, RAM-constrained
#        device.  (Dynamic text uses Arduino String where appropriate;
#        the char[]s are the intentional exception in bounded paths.)
#
#  These suppressions are scoped to the firmware C/C++ sources; they
#  do not affect scripts/orchestrator.py (a normal hosted Python
#  program, where modern-stdlib advice does apply).
#
#  ── ACTION REQUIRED ─────────────────────────────────────────
#  Replace each `cpp:Sxxxx` below with the EXACT rule key shown on
#  the corresponding SonarCloud issue (open the issue → the key is
#  the `cpp:SNNNN` id next to the rule name).  The comment on each
#  line says which rule it is.
# ============================================================

sonar.issue.ignore.multicriteria=embfmt,embchrono,embcharr

# "Use std::format or std::format_to_n instead of snprintf"
sonar.issue.ignore.multicriteria.embfmt.ruleKey=cpp:Sxxxx
sonar.issue.ignore.multicriteria.embfmt.resourceKey=**/*.{h,hpp,c,cpp,ino}

# "Replace this use of strftime with equivalent code using std::chrono"
sonar.issue.ignore.multicriteria.embchrono.ruleKey=cpp:Sxxxx
sonar.issue.ignore.multicriteria.embchrono.resourceKey=**/*.{h,hpp,c,cpp,ino}

# "Use std::string instead of a C-style char array"
sonar.issue.ignore.multicriteria.embcharr.ruleKey=cpp:Sxxxx
sonar.issue.ignore.multicriteria.embcharr.resourceKey=**/*.{h,hpp,c,cpp,ino}
