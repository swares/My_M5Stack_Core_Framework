R 2 · Pi #2<\u002Fdiv>\n        <div class=\"rname\" style=\"font-size:15px; line-height:1.3;\">Qwen2.5‑Coder‑3B<\u002Fdiv>\n        <p style=\"font-size:12.5px; color:var(--ink-2); margin:8px 0 0;\">worker + runs the <code class=\"inline\">claude<\u002Fcode> CLI headless<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding-left:24px;\">\n        <div class=\"rrank\" style=\"margin-bottom:6px; color:var(--petrol);\">TIER 3 · cloud<\u002Fdiv>\n        <div class=\"rname\" style=\"font-size:15px; line-height:1.3; color:var(--petrol);\">Claude Code<\u002Fdiv>\n        <p style=\"font-size:12.5px; color:var(--ink-2); margin:8px 0 0;\">does the work that has to be correct<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:13px; color:var(--ink-2); margin: 22px 0 0; max-width:70ch;\">One family top to bottom means one tool‑call dialect, one prompt style, one set of quirks to tune around — and Qwen is the family RKLLama supports best for function calling, which is the exact seam where Claude Code plugs in.<\u002Fp>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 32px;\">Reality check on speed: these convert‑to‑rkllm builds need the <code class=\"inline\">w8a8<\u002Fcode> RK3588 format (e.g. the <code class=\"inline\">c01zaut<\u002Fcode> Hugging Face repos) — stock Ollama/GGUF models won't touch the NPU. And at 3–7 t/s a 7B is a fine <em>router<\u002Fem>, not a fast coder. That's the whole point: it routes, Claude Code codes.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §9 IS IT WORTH IT ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 09<\u002Fspan>\n    <span class=\"tag\">The honest accounting<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:24ch;\"><span class=\"num\">J<\u002Fspan>Is this rig actually worth it?<\u002Fh2>\n  <p style=\"max-width:64ch;\">Straight answer: for the goal of <em>shipping code with Claude Code<\u002Fem>, the three boxes are <b>not of significant practical benefit<\u002Fb> over just pointing the <code class=\"inline\">claude<\u002Fcode> CLI at your repo. The reason is structural — the local tier can only absorb the work it's capable of, which is exactly the <em>trivial<\u002Fem> turns it routes away from. All the cost, latency, and privacy exposure live in the hard turns, and those escalate regardless.<\u002Fp>\n\n  <div class=\"twocol\" style=\"margin-top: 32px; gap: 0;\">\n    <div class=\"ledger-col\" style=\"border-right: 1px solid var(--rule); border: 1px solid var(--rule); border-radius: 4px 0 0 4px;\">\n      <h4 style=\"color: var(--rust);\">What it genuinely buys you<\u002Fh4>\n      <ul>\n        <li><b>Learning &amp; homelab value<\u002Fb>The strongest real return — understanding edge inference, NPUs, and routing. But it's <em>personal<\u002Fem>, not economic.<\u002Fli>\n        <li><b>An ambient front-end<\u002Fb>A 1.5 W device that's always on the desk is a different object than opening a laptop. A genuine, if modest, UX win.<\u002Fli>\n        <li><b>Offline reflexes<\u002Fb>Trivial Q&amp;A and status keep working when the network drops — useful for a kiosk or air-gapped triage.<\u002Fli>\n        <li><b>Privacy — partial<\u002Fb>Only for turns that never escalate. Real, but narrow.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div class=\"ledger-col\" style=\"border: 1px solid var(--rule); border-left: none; border-radius: 0 4px 4px 0; background: var(--paper-2);\">\n      <h4 style=\"color: var(--muted);\">What it doesn't — for a coding goal<\u002Fh4>\n      <ul>\n        <li><b>Token savings<\u002Fb>The hard turns escalate anyway; the chatter you deflect is worth pennies. You'd never amortise ~$260+ of boards against it.<\u002Fli>\n        <li><b>Privacy on the actual work<\u002Fb>The moment a coding task escalates, your brief <em>and code<\u002Fem> leave the network — identical to using Claude directly.<\u002Fli>\n        <li><b>Speed<\u002Fb>A 3–7 t/s router isn't doing the heavy lifting; it's a gate in front of the thing that is.<\u002Fli>\n        <li><b>A Claude replacement<\u002Fb>A 0.5–7B can't code at that level. That's the whole reason it escalates.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 32px;\">Treat the current rig as a <em>tinkering and ambient-interface project that can reach Claude Code<\u002Fem> — not a way to make Claude cheaper or more private. If you want the local tier to actually <em>finish<\u002Fem> real coding work before escalating, that stops being a software question and becomes a hardware one. ↓<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §10 REAL CODING HARDWARE ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 10<\u002Fspan>\n    <span class=\"tag\">Hardware for real local coding<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">K<\u002Fspan>What it takes to finish work <em>before<\u002Fem> Claude.<\u002Fh2>\n  <p style=\"max-width:64ch;\">To make the local tier a real coder — not just a router — you need a box that can hold a genuinely capable coding model. The bar for “real” in 2026 is roughly <b>Qwen3‑Coder‑Next<\u002Fb>: an 80B MoE with only 3B active params that fits in ~46 GB at Q4 and scores <b>58.7% on SWE‑bench Verified<\u002Fb> — against Claude Sonnet‑4's ~65%. Close enough to finish most tasks locally and only escalate the genuinely hard ones.<\u002Fp>\n  <p style=\"max-width:64ch; font-size:13.5px; color:var(--muted);\">Prices are approximate, mid‑2026, USD. None of these touch the RK3588 NPU — they're separate machines (a Mac or a GPU box) that join your network as a new rung in the ladder.<\u002Fp>\n\n  <div class=\"threecol\" style=\"margin-top: 36px; align-items: stretch;\">\n    <!-- Tier 1 -->\n    <div class=\"ptier\">\n      <span class=\"ptier-lab\">Entry · capable assistant<\u002Fspan>\n      <div class=\"ptier-name\">The 24 GB tier<\u002Fdiv>\n      <div class=\"ptier-price\">$1,300–2,000<\u002Fdiv>\n      <hr>\n      <dl>\n        <dt>Box<\u002Fdt><dd>Used RTX 3090 24 GB (~$800) + host PC, <em>or<\u002Fem> Mac Mini M4 Pro 64 GB (~$2,000)<\u002Fdd>\n        <dt>Runs<\u002Fdt><dd>Qwen2.5‑Coder‑32B · Qwen3.6‑27B<\u002Fdd>\n        <dt>Level<\u002Fdt><dd>~85% HumanEval, ~49% SWE‑bench · 25–40 t/s on the GPU<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"verdict\">Real refactors, tests, and debugging — but still clearly below Claude on hard agentic work.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Tier 2 ★ -->\n    <div class=\"ptier star\">\n      <span class=\"ptier-lab\" style=\"color:var(--ochre);\">★ Sweet spot · agentic coder<\u002Fspan>\n      <div class=\"ptier-name\">The 64–128 GB tier<\u002Fdiv>\n      <div class=\"ptier-price\">$2,000–3,500<\u002Fdiv>\n      <hr>\n      <dl>\n        <dt>Box<\u002Fdt><dd>Mac Studio M4 Max 128 GB (~$3,500), <em>or<\u002Fem> 2× RTX 3090 = 48 GB (~$2,400), <em>or<\u002Fem> Strix Halo 128 GB (~$2,000)<\u002Fdd>\n        <dt>Runs<\u002Fdt><dd>Qwen3‑Coder‑Next 80B MoE @ Q4 (~46 GB), 20+ t/s, 256K context, native tool calling<\u002Fdd>\n        <dt>Level<\u002Fdt><dd>~59% SWE‑bench Verified — most of the way to Sonnet‑4<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"verdict\">This is where “finish it locally, escalate only the hard part” becomes real.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Tier 3 -->\n    <div class=\"ptier\">\n      <span class=\"ptier-lab\">Frontier‑adjacent · open weights<\u002Fspan>\n      <div class=\"ptier-name\">The 512 GB tier<\u002Fdiv>\n      <div class=\"ptier-price\">$9,500+<\u002Fdiv>\n      <hr>\n      <dl>\n        <dt>Box<\u002Fdt><dd>Mac Studio M3 Ultra 512 GB (~$9,500), <em>or<\u002Fem> an EPYC server w/ 512 GB–1 TB RAM + GPU offload ($4–8k)<\u002Fdd>\n        <dt>Runs<\u002Fdt><dd>Qwen3‑Coder‑480B (61.8% Aider Polyglot) · DeepSeek‑V3 671B @ Q4 (~400 GB) at 17–20 t/s<\u002Fdd>\n        <dt>Level<\u002Fdt><dd>Rivals Sonnet‑4 / GPT‑4.1 on coding — at home<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"verdict\">Big spend, diminishing returns: huge‑context prompt processing is slow, and Claude's harness still often wins.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- where it slots in -->\n  <div style=\"margin-top: 44px; background: var(--paper-2); border-radius: 4px; padding: 30px 30px 26px;\">\n    <h3 class=\"sub\" style=\"font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom: 20px;\">Where it slots into your ladder<\u002Fh3>\n    <svg viewBox=\"0 0 1060 92\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <g font-family=\"Geist Mono, monospace\" font-size=\"11\">\n        <!-- nodes -->\n        <rect x=\"0\" y=\"26\" width=\"150\" height=\"44\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"75\" y=\"46\" text-anchor=\"middle\" class=\"step-title\">CoreS3<\u002Ftext>\n        <text x=\"75\" y=\"61\" text-anchor=\"middle\" class=\"ann\">reflex · UI<\u002Ftext>\n\n        <rect x=\"206\" y=\"26\" width=\"160\" height=\"44\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"286\" y=\"46\" text-anchor=\"middle\" class=\"step-title\">Orange Pi<\u002Ftext>\n        <text x=\"286\" y=\"61\" text-anchor=\"middle\" class=\"ann\">router<\u002Ftext>\n\n        <rect x=\"422\" y=\"20\" width=\"200\" height=\"56\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.8\"><\u002Frect>\n        <text x=\"522\" y=\"42\" text-anchor=\"middle\" class=\"step-title\">NEW · coding box<\u002Ftext>\n        <text x=\"522\" y=\"58\" text-anchor=\"middle\" class=\"ann\">Qwen3‑Coder‑Next · finishes most<\u002Ftext>\n\n        <rect x=\"678\" y=\"26\" width=\"170\" height=\"44\" rx=\"3\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" stroke-dasharray=\"4 4\"><\u002Frect>\n        <text x=\"763\" y=\"46\" text-anchor=\"middle\" class=\"step-title\" fill=\"var(--petrol)\">Claude Code<\u002Ftext>\n        <text x=\"763\" y=\"61\" text-anchor=\"middle\" class=\"ann\">the hard part only<\u002Ftext>\n\n        <!-- arrows -->\n        <g stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\">\n          <path d=\"M150 48 L204 48\" marker-end=\"url(#k1)\"><\u002Fpath>\n          <path d=\"M366 48 L420 48\" marker-end=\"url(#k1)\"><\u002Fpath>\n          <path d=\"M622 48 L676 48\" marker-end=\"url(#k1)\"><\u002Fpath>\n        <\u002Fg>\n        <text x=\"900\" y=\"44\" class=\"ann\">escalations<\u002Ftext>\n        <text x=\"900\" y=\"60\" class=\"ann\">drop sharply ↓<\u002Ftext>\n      <\u002Fg>\n      <defs>\n        <marker id=\"k1\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <p style=\"font-size:13px; color:var(--ink-2); margin: 20px 0 0; max-width:72ch;\">Add one Tier‑2 box as a <b>local senior coder<\u002Fb> between the Pi router and Claude. Now the Pi escalates to <em>it<\u002Fem> first; only what it can't finish climbs to Claude Code. That genuinely cuts cloud calls — but note you've now spent <b>$2–3.5k<\u002Fb> to do it, which only pays back as privacy, offline capability, or the sheer enjoyment of running it. As a pure dollars‑per‑task trade against the API, it still doesn't.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §11 LEVEL OF EFFORT ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 11<\u002Fspan>\n    <span class=\"tag\">Level of effort<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">L<\u002Fspan>What will it actually take to build?<\u002Fh2>\n  <p style=\"max-width:64ch;\">Honest distribution: a <b>crude demo is a weekend<\u002Fb>, something <b>you'd actually rely on is 2–4 weeks of evenings<\u002Fb>, and it carries real <b>ongoing upkeep<\u002Fb>. The lopsided part is that the glue code is easy — the NPU and embedded layers are finicky and still officially “experimental,” and that's where the hours vanish.<\u002Fp>\n  <p style=\"max-width:64ch; font-size:13.5px; color:var(--muted);\"><b>Skill floor:<\u002Fb> comfortable with Linux/SSH, Python, flashing SBC images, and patient with half-documented tooling. If that's you, it's very doable; if any of it is new, roughly double every estimate.<\u002Fp>\n\n  <!-- effort table -->\n  <div style=\"margin-top: 36px;\">\n    <div class=\"erow\">\n      <div class=\"ecomp\">Glue / orchestration <small>escalate tool · brief renderer · call to Claude Code · stream translation<\u002Fsmall><\u002Fdiv>\n      <div class=\"ebadge easy\">Easy · 2–4 days<\u002Fdiv>\n      <div class=\"epain\">Just normal Python — the §02–05 code is most of it.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"erow\">\n      <div class=\"ecomp\">Claude Code itself <small>auth · repo checkout · headless -p<\u002Fsmall><\u002Fdiv>\n      <div class=\"ebadge easy\">Easy · hours<\u002Fdiv>\n      <div class=\"epain\">Runs on arm64; trivial once a key is in place.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"erow\">\n      <div class=\"ecomp\">Orange Pi router <small>RKLLama · NPU · converted models · reliable tool calling<\u002Fsmall><\u002Fdiv>\n      <div class=\"ebadge hard\">Hard · 1–2 weeks<\u002Fdiv>\n      <div class=\"epain\">The bulk of the project — see the hard parts below.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"erow\">\n      <div class=\"ecomp\">M5Stack front-end <small>firmware · apt models · forwarding · UI<\u002Fsmall><\u002Fdiv>\n      <div class=\"ebadge easy\">Easy · hours*<\u002Fdiv>\n      <div class=\"epain\">*Your own framework already solves the AX630C comms (below); only the forwarding glue is left.<\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"erow\">\n      <div class=\"ecomp\">Optional coding box <small>Mac / GPU + Ollama (§10)<\u002Fsmall><\u002Fdiv>\n      <div class=\"ebadge easy\">Easy · hours<\u002Fdiv>\n      <div class=\"epain\">Ollama is turnkey; wiring it in as a rung is more glue.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- hard parts -->\n  <div style=\"margin-top: 40px;\" class=\"twocol\">\n    <div>\n      <h3 class=\"sub\" style=\"font-size:15px;\">The genuinely hard parts — all on the Orange Pi<\u002Fh3>\n      <ul class=\"bullets\" style=\"margin-top:10px;\">\n        <li>Needs a <b>bespoke Ubuntu 24.04<\u002Fb> build with the right <b>RKNPU driver (0.9.6+)<\u002Fb> — not the stock OS image.<\u002Fli>\n        <li>Models must be <b>converted to the RK3588 <code class=\"inline\">rkllm<\u002Fcode> format<\u002Fb> (the <code class=\"inline\">w8a8<\u002Fcode> builds). Stock Ollama/GGUF won't touch the NPU; converting yourself needs a separate x86 box with the toolkit.<\u002Fli>\n        <li>The notorious <b>git-lfs gotcha<\u002Fb>: you silently pull 135-byte pointer files instead of weights and get cryptic load errors.<\u002Fli>\n        <li><b>NPU tool-calling is newer than CPU<\u002Fb> — making <code class=\"inline\">escalate_to_claude_code<\u002Fcode> fire reliably every time is the make-or-break, and the likeliest weekend-eater.<\u002Fli>\n      <\u002Ful>\n    <\u002Fdiv>\n    <div>\n      <div class=\"code-card\" style=\"background: #14301F; border: 1px solid #2C5C3E;\">\n        <div style=\"font-family:'Geist Mono',monospace; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:#7FB58E; margin-bottom:12px;\">↓ Fastest path to “working”<\u002Fdiv>\n        <p style=\"color:#DDEBE0; font-size:14px; line-height:1.5; margin:0 0 12px;\">Skip the NPU <em>and<\u002Fem> the M5 for v1. The whole loop in a realistic <b>weekend<\u002Fb>:<\u002Fp>\n        <pre class=\"code\" style=\"background:transparent; padding:0; font-size:11.5px;\"><span class=\"c\"># on one Orange Pi, CPU only<\u002Fspan>\n$ curl -fsSL https://ollama.com/install.sh | sh\n$ ollama pull qwen2.5:7b   <span class=\"c\"># ~3–7 t/s, turnkey<\u002Fspan>\n\n<span class=\"c\"># ~200 lines of Python:<\u002Fspan>\n<span class=\"c\">#  • expose escalate_to_claude_code as a tool<\u002Fspan>\n<span class=\"c\">#  • on a tool call, shell out to `claude -p`<\u002Fspan>\n<span class=\"c\">#  • type into it over SSH<\u002Fspan><\u002Fpre>\n        <p style=\"color:#9FC4A8; font-size:12.5px; line-height:1.5; margin:12px 0 0;\">Proves the routing loop end-to-end. Then add the NPU, the touchscreen, and the §10 coding box as separate upgrades.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- framework note -->\n  <div style=\"margin-top: 44px; background: var(--paper-2); border-radius: 4px; padding: 28px 30px;\">\n    <div style=\"display:flex; align-items:baseline; gap:12px; flex-wrap:wrap; margin-bottom: 14px;\">\n      <h3 class=\"sub\" style=\"font-size:15px; margin:0;\">Does your <span style=\"font-family:'Geist Mono',monospace; font-size:13px;\">M5Stack_I2C_Framework<\u002Fspan> reduce complexity?<\u002Fh3>\n      <span class=\"pill\" style=\"border-color:#4F7A4A;\"><span class=\"dot\" style=\"background:#4F7A4A;\"><\u002Fspan>verified · source read<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"max-width:74ch;\">Yes — it <b>removes the single most fiddly chunk outright,<\u002Fb> just not the one its name implies. It's a board-aware (CoreS3 / Core2 / Tough / Core1, auto-detected) plugin framework that exposes M5Stack devices over an <b>HTTPS REST API + live dashboard<\u002Fb> (also MQTT / SD / serial / LCD). And it already ships <code class=\"inline\">UartDevice_ModuleLLM.h<\u002Fcode>: a complete, <em>debugged<\u002Fem> integration of the AX630C Module LLM.<\u002Fp>\n    <div class=\"twocol\" style=\"gap:30px; margin-top: 8px;\">\n      <div>\n        <p style=\"font-size:13px; margin:0 0 10px;\"><b>What it already solves<\u002Fb> — the exact embedded landmines from the table above:<\u002Fp>\n        <ul class=\"bullets\" style=\"margin:0;\">\n          <li style=\"font-size:12.5px;\">StackFlow JSON-over-UART via the official <code class=\"inline\">M5Module-LLM<\u002Fcode> lib — <b>async token streaming<\u002Fb>, never stalls the loop.<\u002Fli>\n          <li style=\"font-size:12.5px;\">The nastiest AX630C bug — StackFlow <b>unit-leak across host reboots<\u002Fb> — handled with <code class=\"inline\">sys.reset()<\u002Fcode> + RX-buffer tuning.<\u002Fli>\n          <li style=\"font-size:12.5px;\">The LLM exposed as <code class=\"inline\">GET /api/llm/set?ask=…<\u002Fcode> + <code class=\"inline\">/api/llm<\u002Fcode>, with a dashboard chat panel, TLS, and auth.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div>\n        <p style=\"font-size:13px; margin:0 0 10px;\"><b>What it doesn't — and reshapes<\u002Fb><\u002Fp>\n        <p style=\"font-size:12.5px; margin:0 0 10px; color:var(--ink-2);\">It makes the CoreS3 a <b>networked Module-LLM micro-service<\u002Fb> (any device can hit <code class=\"inline\">/api/llm<\u002Fcode>) — <em>not<\u002Fem> a terminal that forwards. There's no escalation tool and no call out to the Pi or Claude.<\u002Fp>\n        <p style=\"font-size:12.5px; margin:0; color:var(--ink-2);\">So the routing glue lives <em>outside<\u002Fem> it: either an orchestrator that calls <code class=\"inline\">/api/llm<\u002Fcode> for trivial turns and Claude Code for hard ones, or a new forwarding plugin you add — clean, since you own the plugin model.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:12.5px; color:var(--ink-2); margin: 18px 0 0; max-width:78ch; border-top:1px solid var(--rule); padding-top:14px;\"><b>Net effect:<\u002Fb> the M5 firmware rung drops from <span style=\"color:var(--ochre); font-weight:600;\">Moderate · 1–3 days<\u002Fspan> to <span style=\"color:#4F7A4A; font-weight:600;\">Easy · hours<\u002Fspan> — the hard-won part is done and battle-tested. But total project effort still barely moves: the <b>Orange Pi NPU + router remains the bottleneck<\u002Fb>, and this framework doesn't touch it. Its real gift is a clean, networked, extensible base you already control — the ideal place to bolt the escalation forwarder onto.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §12 THE FORWARDING PLUGIN ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 12<\u002Fspan>\n    <span class=\"tag\">The forwarding plugin<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">M<\u002Fspan>Two ways to wire the router.<\u002Fh2>\n  <p style=\"max-width:64ch;\">The “router + voice” tier from §00–§05 can live in one of two places. <b>Option A<\u002Fb> puts it <em>on the Core<\u002Fem> as a drop-in framework plugin. <b>Option B<\u002Fb> puts it in an <em>external orchestrator<\u002Fem> and leaves the Core firmware untouched. Same job, different home — pick by whether you want the Core self-contained or the routing easy to iterate.<\u002Fp>\n\n  <h3 class=\"sub\" style=\"margin-top: 36px; font-size:17px; color:var(--ochre);\">Option A · on the Core — <code class=\"inline\" style=\"font-size:0.8em;\">NetDevice_Router.h<\u002Fcode><\u002Fh3>\n  <p style=\"max-width:64ch; margin-top:6px;\">Makes the CoreS3 the single chat entry point: it classifies each turn on-device, answers trivial ones from the on-board Module LLM, and escalates hard ones to the Pi — which fronts Claude Code.<\u002Fp>\n\n  <div class=\"callout\" style=\"margin-top: 24px; border-color: #4F7A4A;\">No new base class, no edits to <code class=\"inline\">Framework<\u002Fcode>. <code class=\"inline\">IPinDevice<\u002Fcode> already provides the non-I2C “registered = active via <code class=\"inline\">beginPins()<\u002Fcode>” path — the router just subclasses it, exactly as <code class=\"inline\">IUartDevice<\u002Fcode> does.<p><\u002Fp>\n\n  <!-- state machine -->\n  <div style=\"margin-top: 36px; background: var(--paper-2); border-radius: 4px; padding: 30px 24px 18px;\">\n    <svg viewBox=\"0 0 1060 220\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <g font-family=\"Geist Mono, monospace\">\n        <!-- ask -->\n        <rect x=\"0\" y=\"86\" width=\"150\" height=\"48\" rx=\"3\" fill=\"white\" stroke=\"var(--ink)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"75\" y=\"106\" text-anchor=\"middle\" class=\"step-title\">/api/route/set<\u002Ftext>\n        <text x=\"75\" y=\"122\" text-anchor=\"middle\" class=\"ann\">?ask=…<\u002Ftext>\n\n        <!-- classify -->\n        <path d=\"M150 110 L208 110\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#m1)\"><\u002Fpath>\n        <rect x=\"210\" y=\"80\" width=\"160\" height=\"60\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"290\" y=\"104\" text-anchor=\"middle\" class=\"step-title\">_needsEscalation()<\u002Ftext>\n        <text x=\"290\" y=\"122\" text-anchor=\"middle\" class=\"ann\">heuristic · on-device<\u002Ftext>\n\n        <!-- local branch -->\n        <path d=\"M370 96 C 430 70, 470 60, 540 60\" stroke=\"var(--ochre)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#m2)\"><\u002Fpath>\n        <text x=\"452\" y=\"52\" text-anchor=\"middle\" class=\"ann\">trivial<\u002Ftext>\n        <rect x=\"542\" y=\"34\" width=\"210\" height=\"52\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"647\" y=\"56\" text-anchor=\"middle\" class=\"step-title\">Module LLM<\u002Ftext>\n        <text x=\"647\" y=\"73\" text-anchor=\"middle\" class=\"ann\">delegate + mirror toJson()<\u002Ftext>\n\n        <!-- escalate branch -->\n        <path d=\"M370 124 C 430 150, 470 162, 540 162\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#m3)\"><\u002Fpath>\n        <text x=\"452\" y=\"178\" text-anchor=\"middle\" class=\"ann\">hard<\u002Ftext>\n        <rect x=\"542\" y=\"136\" width=\"210\" height=\"52\" rx=\"3\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.4\" stroke-dasharray=\"4 4\"><\u002Frect>\n        <text x=\"647\" y=\"158\" text-anchor=\"middle\" class=\"step-title\">POST https://pi1/delegate<\u002Ftext>\n        <text x=\"647\" y=\"175\" text-anchor=\"middle\" class=\"ann\">stream SSE in fastPoll()<\u002Ftext>\n\n        <!-- merge to answer -->\n        <path d=\"M752 60 C 830 60, 850 100, 880 106\" stroke=\"var(--ochre)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#m1)\"><\u002Fpath>\n        <path d=\"M752 162 C 830 162, 850 120, 880 114\" stroke=\"var(--petrol)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#m1)\"><\u002Fpath>\n        <rect x=\"882\" y=\"86\" width=\"170\" height=\"48\" rx=\"3\" fill=\"white\" stroke=\"var(--ink)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"967\" y=\"106\" text-anchor=\"middle\" class=\"step-title\">_answer → toJson<\u002Ftext>\n        <text x=\"967\" y=\"122\" text-anchor=\"middle\" class=\"ann\">route_taken · busy · done<\u002Ftext>\n      <\u002Fg>\n      <defs>\n        <marker id=\"m1\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"m2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ochre)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"m3\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <div class=\"figcap\"><b>Fig. M<\u002Fb> &nbsp;·&nbsp; one async state machine: classify → (local | escalate) → unified streaming answer<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- interface + register -->\n  <div class=\"twocol\" style=\"margin-top: 44px; gap: 36px; align-items: start;\">\n    <div>\n      <h3 class=\"sub\">What it implements<\u002Fh3>\n      <p class=\"tight\" style=\"font-size:13.5px;\">The same <code class=\"inline\">IDevice<\u002Fcode> surface every plugin exposes — so it gets a dashboard widget, REST endpoint, MQTT, and SD logging with zero extra wiring.<\u002Fp>\n      <div class=\"ranklist\" style=\"margin-top:8px;\">\n        <div class=\"rrow\"><div class=\"rrank\">slug<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">route<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\"><code class=\"inline\">/api/route/set?ask=…<\u002Fcode> + <code class=\"inline\">/api/route<\u002Fcode><\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">ctrl<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">controlSchema()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\">text box + Clear button auto-render on the dashboard<\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">async<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">wantsFastPoll()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\">streams the reply without ever blocking the loop<\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">guard<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">update()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\"><code class=\"inline\">REPLY_IDLE_MS<\u002Fcode> inactivity timeout, same as the LLM plugin<\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">out<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">toJson()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\"><code class=\"inline\">route_taken<\u002Fcode> = local / escalated → flows to MQTT + SD log<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">Register it (one line each)<\u002Fh3>\n      <pre class=\"code\"><span class=\"lbl\">M5Stack_I2C_Framework.ino<\u002Fspan><span class=\"c\">// the local model — the one UART device<\u002Fspan>\n<span class=\"k\">auto<\u002Fspan>* llm = <span class=\"k\">new<\u002Fspan> UartDevice_ModuleLLM(Serial2, 115200);\nfw.addPlugin(llm);\n\n<span class=\"c\">// the router — hands trivial turns to `llm`,<\u002Fspan>\n<span class=\"c\">// escalates the rest to the Pi orchestrator<\u002Fspan>\nfw.addPlugin(<span class=\"k\">new<\u002Fspan> NetDevice_Router(llm));<\u002Fpre>\n      <p style=\"font-size:12.5px; color:var(--muted); margin-top:14px;\">Point it at the Pi via the tunables at the top of the file — <code class=\"inline\">PI_HOST<\u002Fcode>, <code class=\"inline\">PI_PATH<\u002Fcode>, <code class=\"inline\">BEARER<\u002Fcode>, <code class=\"inline\">TLS_INSECURE<\u002Fcode>. The CoreS3 never holds the Anthropic key; the Pi does.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- the decoupling trick -->\n  <div class=\"twocol\" style=\"margin-top: 40px; gap: 36px; align-items: start;\">\n    <div>\n      <h3 class=\"sub\">The decoupling trick<\u002Fh3>\n      <p style=\"font-size:13.5px;\">For trivial turns it delegates to the Module LLM and then <em>mirrors<\u002Fem> its streamed answer through the <b>public<\u002Fb> <code class=\"inline\">toJson()<\u002Fcode> — so it reads the reply with zero coupling to the other plugin's internals. The LLM's own <code class=\"inline\">fastPoll()<\u002Fcode> drives the UART; the router only observes.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <pre class=\"code\"><span class=\"lbl\">_pumpLocal() — mirror via public interface<\u002Fspan>JsonDocument d;\nJsonObject o = d.to&lt;JsonObject&gt;();\n_localLlm-&gt;toJson(o);            <span class=\"c\">// public only<\u002Fspan>\n\nString a = o[<span class=\"s\">\"answer\"<\u002Fspan>] | <span class=\"s\">\"\"<\u002Fspan>;\n<span class=\"k\">if<\u002Fspan> (a.length() &amp;&amp; a != _answer) {\n  _answer  = a;                 <span class=\"c\">// adopt streamed text<\u002Fspan>\n  _lastRxMs = millis();         <span class=\"c\">// keep-alive<\u002Fspan>\n}\n<span class=\"k\">if<\u002Fspan> ((o[<span class=\"s\">\"done\"<\u002Fspan>] | 0) || !(o[<span class=\"s\">\"busy\"<\u002Fspan>] | 0))\n  _finish(o[<span class=\"s\">\"timed_out\"<\u002Fspan>] | 0);<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 36px;\">The escalated path expects the Pi to answer <code class=\"inline\">text/event-stream<\u002Fcode> — lines of <code class=\"inline\">data: {\"delta\":\"…\"}<\u002Fcode> ending in <code class=\"inline\">data: [DONE]<\u002Fcode>. That's the one seam to match to your orchestrator; it lives entirely in <code class=\"inline\">_consumeLine()<\u002Fcode>. Everything else — classify, delegate, mirror, time-out, dashboard, logging — is done.<\u002Fdiv>\n\n  <!-- ─── Option B ─── -->\n  <div style=\"margin-top: 72px; border-top: 1px solid var(--ink); padding-top: 28px;\"><\u002Fdiv>\n  <h3 class=\"sub\" style=\"font-size:17px; color:var(--petrol);\">Option B · external orchestrator — <code class=\"inline\" style=\"font-size:0.8em;\">orchestrator.py<\u002Fcode><\u002Fh3>\n  <p style=\"max-width:64ch; margin-top:6px;\">The same routing, moved <em>off<\u002Fem> the Core into a small Python service (runs on the Pi or any box). <b>The Core needs zero new firmware<\u002Fb> — the <code class=\"inline\">/api/llm<\u002Fcode> endpoint that <code class=\"inline\">UartDevice_ModuleLLM.h<\u002Fcode> already exposes <em>is<\u002Fem> the trivial path. And it's mostly the Pi orchestrator you were going to write anyway, with one branch that calls the Core instead of Claude.<\u002Fp>\n\n  <div class=\"callout\" style=\"margin-top: 22px; border-color: #4F7A4A;\">Lower effort than Option A: ~150–200 lines of plain Python, no MCU async, no reflash to change routing. You iterate the classifier in seconds.<\u002Fdiv>\n\n  <div class=\"twocol\" style=\"margin-top: 36px; gap: 36px; align-items: start;\">\n    <div>\n      <h3 class=\"sub\">The shape of it<\u002Fh3>\n      <p class=\"tight\" style=\"font-size:13.5px;\">Three pieces: a Core client (fire-and-poll <code class=\"inline\">/api/llm<\u002Fcode>), a one-line classifier, and a streamed shell-out to <code class=\"inline\">claude -p<\u002Fcode>. A <code class=\"inline\">handle()<\u002Fcode> generator ties them together and keeps a short history for the brief.<\u002Fp>\n      <div class=\"ranklist\" style=\"margin-top:8px;\">\n        <div class=\"rrow\"><div class=\"rrank\">in<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">handle(msg)<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\">terminal loop, or import into a web/API front-end<\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">local<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">CoreClient.ask()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\"><code class=\"inline\">/set?ask=<\u002Fcode> then poll <code class=\"inline\">/api/llm<\u002Fcode> until <code class=\"inline\">done<\u002Fcode><\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">hard<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">run_claude()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\">streams <code class=\"inline\">stream-json<\u002Fcode> events; paraphrases progress<\u002Fdiv><\u002Fdiv>\n        <div class=\"rrow\"><div class=\"rrank\">brief<\u002Fdiv><div class=\"rname\" style=\"font-size:13px;\">build_brief()<\u002Fdiv><div><\u002Fdiv><div class=\"rwhy\">renders the §03 brief from goal + chat summary<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div>\n      <pre class=\"code\"><span class=\"lbl\">orchestrator.py — the trivial path<\u002Fspan><span class=\"k\">def<\u002Fspan> <span class=\"n\">ask<\u002Fspan>(self, prompt, idle=<span class=\"m\">60<\u002Fspan>):\n    self._get(<span class=\"s\">\"/api/llm/set\"<\u002Fspan>, ask=prompt)\n    last, prev = time.time(), <span class=\"s\">\"\"<\u002Fspan>\n    <span class=\"k\">while<\u002Fspan> time.time() - last &lt; idle:\n        s = self._get(<span class=\"s\">\"/api/llm\"<\u002Fspan>)\n        <span class=\"k\">if<\u002Fspan> s[<span class=\"s\">\"answer\"<\u002Fspan>] != prev:        <span class=\"c\"># streaming<\u002Fspan>\n            prev, last = s[<span class=\"s\">\"answer\"<\u002Fspan>], time.time()\n        <span class=\"k\">if<\u002Fspan> s[<span class=\"s\">\"done\"<\u002Fspan>] <span class=\"k\">or<\u002Fspan> s[<span class=\"s\">\"timed_out\"<\u002Fspan>]:\n            <span class=\"k\">return<\u002Fspan> s[<span class=\"s\">\"answer\"<\u002Fspan>]\n        time.sleep(<span class=\"m\">0.3<\u002Fspan>)\n\n<span class=\"c\"># route one turn<\u002Fspan>\n<span class=\"k\">if<\u002Fspan> needs_claude(msg):\n    <span class=\"k\">for<\u002Fspan> kind, text <span class=\"k\">in<\u002Fspan> run_claude(brief, workdir):\n        ...                              <span class=\"c\"># stream to user<\u002Fspan>\n<span class=\"k\">else<\u002Fspan>:\n    answer = core.ask(msg)               <span class=\"c\"># CoreS3<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- tradeoff table -->\n  <h3 class=\"sub\" style=\"margin-top: 44px;\">Which option to pick<\u002Fh3>\n  <div style=\"margin-top: 14px; border: 1px solid var(--rule); border-radius: 4px; overflow:hidden;\">\n    <div style=\"display:grid; grid-template-columns: 1.3fr 1fr 1fr; font-size:13px;\">\n      <div style=\"padding:14px 18px; font-family:'Geist Mono',monospace; font-size:10.5px; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); border-bottom:1px solid var(--rule);\"><\u002Fdiv>\n      <div style=\"padding:14px 18px; font-weight:600; color:var(--ochre); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">A · on-device plugin<\u002Fdiv>\n      <div style=\"padding:14px 18px; font-weight:600; color:var(--petrol); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">B · external orchestrator<\u002Fdiv>\n\n      <div style=\"padding:13px 18px; color:var(--ink); font-weight:600; border-bottom:1px solid var(--rule);\">Core's role<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">self-contained entry point, own dashboard chat box<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">a dumb LLM appliance behind <code class=\"inline\">/api/llm<\u002Fcode><\u002Fdiv>\n\n      <div style=\"padding:13px 18px; color:var(--ink); font-weight:600; border-bottom:1px solid var(--rule);\">Routing logic lives<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">on the ESP32 — reflash to change<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">in Python — edit + rerun in seconds<\u002Fdiv>\n\n      <div style=\"padding:13px 18px; color:var(--ink); font-weight:600; border-bottom:1px solid var(--rule);\">Works if the other box is off<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">yes — Core still answers locally<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-bottom:1px solid var(--rule); border-left:1px solid var(--rule);\">no — the orchestrator is the brain<\u002Fdiv>\n\n      <div style=\"padding:13px 18px; color:var(--ink); font-weight:600;\">Build effort<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:var(--ink-2); border-left:1px solid var(--rule);\">moderate — MCU async, TLS<\u002Fdiv>\n      <div style=\"padding:13px 18px; color:#4F7A4A; font-weight:600; border-left:1px solid var(--rule);\">low — plain Python<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"max-width:64ch; margin-top:18px; font-size:13.5px;\">For iterating on routing — the part you'll tune most — Option B wins easily. Option A wins only when you want the CoreS3 to be a standalone desk device that still works with the Pi powered down. They're not exclusive: run B today to find your thresholds, bake them into A later if you want the appliance.<\u002Fp>\n<\u002Fdiv><\u002Fsection>\n\n<!-- ════════════════ §13 CALL CLAUDE DIRECTLY? ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 13<\u002Fspan>\n    <span class=\"tag\">Can the Core call Claude itself?<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:28ch;\"><span class=\"num\">N<\u002Fspan>Yes — but mind the word “Code.”<\u002Fh2>\n  <p style=\"max-width:64ch;\">The CoreS3 can reach the cloud on its own — it has WiFi and TLS already. But “ask Claude” splits into two very different things, and only one of them fits on an ESP32.<\u002Fp>\n\n  <!-- the distinction -->\n  <div class=\"twocol\" style=\"margin-top: 32px; gap: 28px;\">\n    <div style=\"border:1px solid #4F7A4A; border-radius:4px; padding:22px 24px; background: #F2F5EF;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:#4F7A4A; margin-bottom:10px;\">✓ Fits on the Core<\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:18px;\">Claude — the API<\u002Fh3>\n      <p style=\"font-size:13.5px; margin:0;\">Text in, text out. A chatbot reply: <em>“explain this trace,” “draft this regex,” “summarise this.”<\u002Fem> The Core POSTs to <code class=\"inline\">api.anthropic.com/v1/messages<\u002Fcode> and streams the answer back. ~80-line plugin.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"border:1px solid var(--rust); border-radius:4px; padding:22px 24px; background: #F6EEEC;\">\n      <div style=\"font-family:'Geist Mono',monospace; font-size:10.5px; letter-spacing:0.14em; text-transform:uppercase; color:var(--rust); margin-bottom:10px;\">✗ Cannot run on the Core<\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:18px;\">Claude Code — the agent<\u002Fh3>\n      <p style=\"font-size:13.5px; margin:0;\">Needs a <b>filesystem, shell, git repo, and Node<\u002Fb> to run its read→edit→test loop. The ESP32 has none of these. It can <em>trigger<\u002Fem> Claude Code on the Pi — never <em>be<\u002Fem> it.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 30px;\">A direct call gets you a <em>worded answer<\u002Fem>, not <em>a code change with a diff and passing tests<\u002Fem> — which was the entire reason hard turns escalate in the first place. For anything that touches a codebase, Claude Code still has to run where the repo lives.<\u002Fdiv>\n\n  <!-- why you usually still route through the Pi -->\n  <div style=\"margin-top: 36px;\">\n    <h3 class=\"sub\">Even for pure text, three reasons to think twice<\u002Fh3>\n    <div class=\"threecol\" style=\"margin-top: 16px;\">\n      <div>\n        <div style=\"font-family:'Geist Mono',monospace; font-size:11px; color:var(--rust); margin-bottom:6px;\">01 · KEY EXPOSURE<\u002Fdiv>\n        <p style=\"font-size:13px; margin:0;\">The API key sits in firmware on a desk gadget whose flash can be read. The Pi keeps it on a real machine you control.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Geist Mono',monospace; font-size:11px; color:var(--rust); margin-bottom:6px;\">02 · NO TOOLS<\u002Fdiv>\n        <p style=\"font-size:13px; margin:0;\">Exactly what you escalate <em>for<\u002Fem> — repo edits, running tests — is what a direct call can't do.<\u002Fp>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Geist Mono',monospace; font-size:11px; color:var(--rust); margin-bottom:6px;\">03 · GUTS THE DESIGN<\u002Fdiv>\n        <p style=\"font-size:13px; margin:0;\">If the Core just phones the cloud, the local NPU tier is pointless — you've built a thin cloud client with a screen.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- the tasteful middle: 3-way router -->\n  <div style=\"margin-top: 44px; background: var(--paper-2); border-radius: 4px; padding: 30px 28px;\">\n    <h3 class=\"sub\" style=\"font-size:15px;\">The tasteful use: a three-way router<\u002Fh3>\n    <p style=\"max-width:74ch; font-size:13.5px;\">If you do add it, don't make it the default — make it the <em>middle<\u002Fem> of three routes. Trivial stays local; “smart text with no repo” goes to the Claude API; genuine coding tasks still escalate to Claude Code on the Pi. Cheap things stay cheap, you get a strong cloud answer when no codebase is involved, and the full agent only spins up when there's actually something to edit.<\u002Fp>\n    <svg viewBox=\"0 0 1000 110\" width=\"100%\" height=\"auto\" aria-hidden=\"true\" style=\"margin-top:10px;\">\n      <g font-family=\"Geist Mono, monospace\" font-size=\"11\">\n        <rect x=\"0\" y=\"40\" width=\"150\" height=\"44\" rx=\"3\" fill=\"white\" stroke=\"var(--ink)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"75\" y=\"60\" text-anchor=\"middle\" class=\"step-title\">turn arrives<\u002Ftext>\n        <text x=\"75\" y=\"75\" text-anchor=\"middle\" class=\"ann\">classify<\u002Ftext>\n\n        <!-- three branches -->\n        <path d=\"M150 50 C 210 32, 250 22, 320 22\" stroke=\"var(--rust)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#n2)\"><\u002Fpath>\n        <path d=\"M150 62 L318 62\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#n3)\"><\u002Fpath>\n        <path d=\"M150 74 C 210 92, 250 102, 320 102\" stroke=\"var(--ink-2)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#n1)\"><\u002Fpath>\n\n        <rect x=\"322\" y=\"4\" width=\"220\" height=\"38\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"432\" y=\"22\" text-anchor=\"middle\" class=\"step-title\">trivial<\u002Ftext>\n        <text x=\"432\" y=\"35\" text-anchor=\"middle\" class=\"ann\">→ local Module LLM<\u002Ftext>\n\n        <rect x=\"322\" y=\"45\" width=\"220\" height=\"34\" rx=\"3\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.3\"><\u002Frect>\n        <text x=\"432\" y=\"66\" text-anchor=\"middle\" class=\"step-title\" fill=\"var(--petrol)\">smart text, no repo → Claude API<\u002Ftext>\n\n        <rect x=\"322\" y=\"83\" width=\"220\" height=\"24\" rx=\"3\" fill=\"white\" stroke=\"var(--ink)\" stroke-width=\"1.3\" stroke-dasharray=\"3 3\"><\u002Frect>\n        <text x=\"432\" y=\"99\" text-anchor=\"middle\" class=\"ann\">coding task → Claude Code (Pi)<\u002Ftext>\n\n        <text x=\"600\" y=\"40\" class=\"ann\">cheap stays cheap ·<\u002Ftext>\n        <text x=\"600\" y=\"56\" class=\"ann\">cloud only when it helps ·<\u002Ftext>\n        <text x=\"600\" y=\"72\" class=\"ann\">agent only with a repo<\u002Ftext>\n      <\u002Fg>\n      <defs>\n        <marker id=\"n1\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"n2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--rust)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"n3\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <p style=\"font-size:12.5px; color:var(--muted); margin: 14px 0 0;\">The direct-API branch ships as <code class=\"inline\">NetDevice_ClaudeAPI.h<\u002Fcode> — a sibling to <code class=\"inline\">NetDevice_Router.h<\u002Fcode>, same <code class=\"inline\">IPinDevice<\u002Fcode> base, same streaming pattern. Register it and add one branch to the router's classifier.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §14 TWO TOPOLOGIES ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 14<\u002Fspan>\n    <span class=\"tag\">Two deployment shapes<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">O<\u002Fspan>Core alone, or Core with a Pi.<\u002Fh2>\n  <p style=\"max-width:64ch;\">The same CoreS3 firmware supports two very different topologies, decided entirely by which plugins you register. Pick by one question: <em>do you need work that touches a real codebase?<\u002Fem> If never, the Core stands alone. If yes, a Pi (or any always-on box) joins as the agent tier.<\u002Fp>\n\n  <!-- ── Topology A: no Pi ── -->\n  <div style=\"margin-top: 44px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n      <h3 class=\"sub\" style=\"font-size:18px; margin:0;\">A · Core alone — no Pi<\u002Fh3>\n      <span class=\"pill rust\"><span class=\"dot\"><\u002Fspan>two tiers<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"max-width:64ch; font-size:13.5px;\">The CoreS3 is the whole device. It answers trivial turns from its on-board Module LLM, and — optionally — sends “smart text” turns straight to the Claude <b>API<\u002Fb> over the internet. No second machine. There is <b>no Claude Code<\u002Fb> here: with no filesystem or shell, the Core can get worded answers but never a code change with a diff.<\u002Fp>\n\n    <div style=\"margin-top: 22px; background: var(--paper-2); border-radius: 4px; padding: 30px 24px 18px;\">\n      <svg viewBox=\"0 0 1000 260\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n        <!-- user -->\n        <circle cx=\"70\" cy=\"130\" r=\"32\" fill=\"white\" stroke=\"var(--user)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"70\" y=\"134\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--user)\">USER<\u002Ftext>\n        <text x=\"70\" y=\"184\" text-anchor=\"middle\" class=\"ann\">touchscreen<\u002Ftext>\n\n        <!-- core -->\n        <rect x=\"170\" y=\"60\" width=\"280\" height=\"160\" rx=\"4\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.6\"><\u002Frect>\n        <text x=\"186\" y=\"86\" class=\"lane-label\" fill=\"var(--rust)\">M5STACK CoreS3<\u002Ftext>\n        <line x1=\"170\" y1=\"100\" x2=\"450\" y2=\"100\" stroke=\"var(--rust-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"186\" y=\"124\" class=\"step-title\">Module LLM · Qwen2.5-0.5B<\u002Ftext>\n        <text x=\"186\" y=\"142\" class=\"step-text\">on-board · /api/llm<\u002Ftext>\n        <text x=\"186\" y=\"168\" class=\"step-title\" fill=\"var(--petrol)\">NetDevice_ClaudeAPI (optional)<\u002Ftext>\n        <text x=\"186\" y=\"186\" class=\"step-text\">/api/claude · direct HTTPS<\u002Ftext>\n        <text x=\"186\" y=\"204\" class=\"ann\">classify on-device<\u002Ftext>\n\n        <!-- user <-> core -->\n        <path d=\"M102 122 L168 110\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#oa)\"><\u002Fpath>\n        <path d=\"M168 140 L102 150\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#oa)\"><\u002Fpath>\n\n        <!-- to claude api -->\n        <path d=\"M450 150 L600 150\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#op)\" stroke-dasharray=\"5 4\"><\u002Fpath>\n        <text x=\"470\" y=\"140\" class=\"ann\">smart text only<\u002Ftext>\n        <rect x=\"602\" y=\"116\" width=\"200\" height=\"68\" rx=\"4\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.4\" stroke-dasharray=\"4 5\"><\u002Frect>\n        <text x=\"702\" y=\"142\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--petrol)\">CLAUDE API<\u002Ftext>\n        <text x=\"702\" y=\"162\" text-anchor=\"middle\" class=\"step-text\">model · text in/out<\u002Ftext>\n        <text x=\"702\" y=\"178\" text-anchor=\"middle\" class=\"ann\">no tools · no repo<\u002Ftext>\n\n        <!-- no claude code marker -->\n        <text x=\"702\" y=\"214\" text-anchor=\"middle\" class=\"ann-i\" fill=\"var(--rust)\">✗ no Claude Code — no agent<\u002Ftext>\n\n        <!-- boundaries -->\n        <rect x=\"150\" y=\"40\" width=\"320\" height=\"200\" rx=\"2\" fill=\"none\" stroke=\"var(--rule-strong)\" stroke-dasharray=\"2 5\"><\u002Frect>\n        <text x=\"160\" y=\"58\" class=\"ann\">ONE DEVICE · ON THE DESK<\u002Ftext>\n        <text x=\"612\" y=\"108\" class=\"ann\">INTERNET<\u002Ftext>\n\n        <defs>\n          <marker id=\"oa\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n          <marker id=\"op\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n        <\u002Fdefs>\n      <\u002Fsvg>\n      <div class=\"figcap\"><b>Fig. O-A<\u002Fb> &nbsp;·&nbsp; Core alone. Plugins: <code class=\"inline\" style=\"font-size:0.85em;\">UartDevice_ModuleLLM<\u002Fcode> + optional <code class=\"inline\" style=\"font-size:0.85em;\">NetDevice_ClaudeAPI<\u002Fcode>.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"threecol\" style=\"margin-top: 24px;\">\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">Good for<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">A self-contained desk assistant: Q&amp;A, drafting, explaining. Works with the network down for local turns.<\u002Fp><\u002Fdiv>\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">Cost / setup<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">One device. No server to run or maintain. Flash and go.<\u002Fp><\u002Fdiv>\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">The ceiling<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">Answers only. No file edits, no tests, no diffs — and the API key lives in firmware.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- ── Topology B: with Pi ── -->\n  <div style=\"margin-top: 64px; border-top: 1px solid var(--rule); padding-top: 36px;\">\n    <div style=\"display:flex; align-items:baseline; gap:14px; margin-bottom:6px;\">\n      <h3 class=\"sub\" style=\"font-size:18px; margin:0;\">B · Core with a Pi — the full ladder<\u002Fh3>\n      <span class=\"pill\" style=\"border-color:var(--ochre);\"><span class=\"dot\" style=\"background:var(--ochre);\"><\u002Fspan>three tiers<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"max-width:64ch; font-size:13.5px;\">The Core becomes the front-end and router; a Pi (or any always-on Linux box) joins as the brain + agent host. Trivial turns stay on the Core, hard ones escalate to an orchestrator on the Pi, which runs <b>Claude Code<\u002Fb> against a real git checkout and streams a summary + diff back. This is the only shape that <em>finishes<\u002Fem> coding work.<\u002Fp>\n\n    <div style=\"margin-top: 22px; background: var(--paper-2); border-radius: 4px; padding: 30px 24px 18px;\">\n      <svg viewBox=\"0 0 1000 280\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n        <!-- user -->\n        <circle cx=\"60\" cy=\"140\" r=\"30\" fill=\"white\" stroke=\"var(--user)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"60\" y=\"144\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--user)\">USER<\u002Ftext>\n\n        <!-- core -->\n        <rect x=\"138\" y=\"80\" width=\"210\" height=\"120\" rx=\"4\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.6\"><\u002Frect>\n        <text x=\"154\" y=\"104\" class=\"lane-label\" fill=\"var(--rust)\">CoreS3 · FRONT-END<\u002Ftext>\n        <line x1=\"138\" y1=\"116\" x2=\"348\" y2=\"116\" stroke=\"var(--rust-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"154\" y=\"138\" class=\"step-text\">Module LLM (trivial)<\u002Ftext>\n        <text x=\"154\" y=\"158\" class=\"step-title\" fill=\"var(--ochre)\">NetDevice_Router<\u002Ftext>\n        <text x=\"154\" y=\"176\" class=\"step-text\">classify · escalate<\u002Ftext>\n\n        <path d=\"M90 132 L136 122\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#ob)\"><\u002Fpath>\n        <path d=\"M136 150 L90 158\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#ob)\"><\u002Fpath>\n\n        <!-- pi -->\n        <rect x=\"408\" y=\"60\" width=\"240\" height=\"160\" rx=\"4\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.6\"><\u002Frect>\n        <text x=\"424\" y=\"84\" class=\"lane-label\" fill=\"var(--ochre)\">ORANGE PI · BRAIN<\u002Ftext>\n        <line x1=\"408\" y1=\"96\" x2=\"648\" y2=\"96\" stroke=\"var(--ochre-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"424\" y=\"118\" class=\"step-text\">orchestrator.py · /delegate<\u002Ftext>\n        <text x=\"424\" y=\"138\" class=\"step-text\">RKLLama 7B (NPU) router<\u002Ftext>\n        <text x=\"424\" y=\"160\" class=\"step-title\">claude CLI · headless -p<\u002Ftext>\n        <text x=\"424\" y=\"178\" class=\"step-text\">runs on a git checkout<\u002Ftext>\n        <text x=\"424\" y=\"200\" class=\"ann\">read · edit · bash · test<\u002Ftext>\n\n        <!-- core <-> pi -->\n        <path d=\"M348 130 L406 120\" stroke=\"var(--rust)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#oc)\"><\u002Fpath>\n        <text x=\"356\" y=\"112\" class=\"ann\">escalate<\u002Ftext>\n        <path d=\"M406 156 L348 166\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#od)\"><\u002Fpath>\n        <text x=\"356\" y=\"182\" class=\"ann\">stream back<\u002Ftext>\n\n        <!-- claude code -->\n        <path d=\"M648 140 L760 140\" stroke=\"var(--petrol)\" stroke-width=\"1.3\" fill=\"none\" marker-end=\"url(#od)\" stroke-dasharray=\"5 4\"><\u002Fpath>\n        <rect x=\"762\" y=\"104\" width=\"200\" height=\"72\" rx=\"4\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.4\" stroke-dasharray=\"4 5\"><\u002Frect>\n        <text x=\"862\" y=\"130\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--petrol)\">CLAUDE CODE<\u002Ftext>\n        <text x=\"862\" y=\"150\" text-anchor=\"middle\" class=\"step-text\">the agent · API<\u002Ftext>\n        <text x=\"862\" y=\"166\" text-anchor=\"middle\" class=\"ann\">summary + diff<\u002Ftext>\n\n        <!-- boundary -->\n        <rect x=\"118\" y=\"40\" width=\"530\" height=\"220\" rx=\"2\" fill=\"none\" stroke=\"var(--rule-strong)\" stroke-dasharray=\"2 5\"><\u002Frect>\n        <text x=\"128\" y=\"58\" class=\"ann\">YOUR NETWORK · ON-PREM<\u002Ftext>\n        <text x=\"772\" y=\"98\" class=\"ann\">INTERNET · only the hard part leaves<\u002Ftext>\n\n        <defs>\n          <marker id=\"ob\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n          <marker id=\"oc\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--rust)\"><\u002Fpath><\u002Fmarker>\n          <marker id=\"od\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n        <\u002Fdefs>\n      <\u002Fsvg>\n      <div class=\"figcap\"><b>Fig. O-B<\u002Fb> &nbsp;·&nbsp; Core + Pi. Plugins: <code class=\"inline\" style=\"font-size:0.85em;\">UartDevice_ModuleLLM<\u002Fcode> + <code class=\"inline\" style=\"font-size:0.85em;\">NetDevice_Router<\u002Fcode> → <code class=\"inline\" style=\"font-size:0.85em;\">orchestrator.py<\u002Fcode> → Claude Code.<\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"threecol\" style=\"margin-top: 24px;\">\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">Good for<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">Real coding: refactors, tests, debugging that produce a diff. Cheap turns stay local; the key stays on the Pi.<\u002Fp><\u002Fdiv>\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">Cost / setup<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">A second always-on box plus the orchestrator. The NPU tier is where the real build effort lives (§11).<\u002Fp><\u002Fdiv>\n      <div><h3 class=\"sub\" style=\"font-size:12px;\">The payoff<\u002Fh3><p style=\"font-size:12.5px; margin:0;\">Only the genuinely hard part ever reaches the cloud — the agent runs where your code is.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 40px;\">Same firmware, same Config.h. Topology A is <code class=\"inline\">ModuleLLM<\u002Fcode> (+ optional <code class=\"inline\">ClaudeAPI<\u002Fcode>); Topology B adds <code class=\"inline\">NetDevice_Router<\u002Fcode> pointed at a Pi. You can start with A on the bench and grow into B by registering one more plugin and standing up the orchestrator — nothing else changes.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §15 A + B TOGETHER ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 15<\u002Fspan>\n    <span class=\"tag\">Running A and B together<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">P<\u002Fspan>One router, three destinations.<\u002Fh2>\n  <p style=\"max-width:64ch;\">The two topologies aren't exclusive — kept live at once, they make the Core a <b>three-way router<\u002Fb>. The classifier picks per turn: trivial stays local, “smart text” with no repo takes one hop to the Claude <b>API<\u002Fb>, and genuine coding escalates to <b>Claude Code<\u002Fb> on the Pi. Cheap stays cheap; the heavy agent only wakes for work that produces a diff.<\u002Fp>\n\n  <!-- three-route diagram -->\n  <div style=\"margin-top: 36px; background: var(--paper-2); border-radius: 4px; padding: 30px 24px 18px;\">\n    <svg viewBox=\"0 0 1000 260\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <g font-family=\"Geist Mono, monospace\" font-size=\"11\">\n        <!-- classify -->\n        <rect x=\"0\" y=\"100\" width=\"170\" height=\"58\" rx=\"3\" fill=\"white\" stroke=\"var(--ink)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"85\" y=\"124\" text-anchor=\"middle\" class=\"step-title\">_classify()<\u002Ftext>\n        <text x=\"85\" y=\"142\" text-anchor=\"middle\" class=\"ann\">on-device · ~0 ms<\u002Ftext>\n\n        <!-- three branches -->\n        <path d=\"M170 118 C 240 70, 280 50, 360 50\" stroke=\"var(--rust)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#pa)\"><\u002Fpath>\n        <path d=\"M170 129 L358 129\" stroke=\"var(--petrol)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#pb)\"><\u002Fpath>\n        <path d=\"M170 140 C 240 188, 280 208, 360 208\" stroke=\"var(--ochre)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#pc)\"><\u002Fpath>\n\n        <!-- local -->\n        <rect x=\"362\" y=\"26\" width=\"250\" height=\"48\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"378\" y=\"46\" class=\"step-title\" fill=\"var(--rust)\">LOCAL · Module LLM<\u002Ftext>\n        <text x=\"378\" y=\"63\" class=\"ann\">trivial · private · offline-safe<\u002Ftext>\n        <text x=\"630\" y=\"46\" class=\"ann\">route_taken<\u002Ftext>\n        <text x=\"630\" y=\"61\" class=\"ann\">= \"local\"<\u002Ftext>\n\n        <!-- direct api -->\n        <rect x=\"362\" y=\"105\" width=\"250\" height=\"48\" rx=\"3\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"378\" y=\"125\" class=\"step-title\" fill=\"var(--petrol)\">DIRECT · Claude API<\u002Ftext>\n        <text x=\"378\" y=\"142\" class=\"ann\">smart text · no repo · one hop<\u002Ftext>\n        <text x=\"630\" y=\"125\" class=\"ann\">route_taken<\u002Ftext>\n        <text x=\"630\" y=\"140\" class=\"ann\">= \"direct_api\"<\u002Ftext>\n\n        <!-- escalate -->\n        <rect x=\"362\" y=\"184\" width=\"250\" height=\"48\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.4\"><\u002Frect>\n        <text x=\"378\" y=\"204\" class=\"step-title\" fill=\"var(--ochre)\">ESCALATE · Pi → Claude Code<\u002Ftext>\n        <text x=\"378\" y=\"221\" class=\"ann\">coding · the agent · diff<\u002Ftext>\n        <text x=\"630\" y=\"204\" class=\"ann\">route_taken<\u002Ftext>\n        <text x=\"630\" y=\"219\" class=\"ann\">= \"escalated\"<\u002Ftext>\n\n        <!-- ordering note -->\n        <text x=\"770\" y=\"120\" class=\"ann-i\" font-size=\"13\">coding wins first,<\u002Ftext>\n        <text x=\"770\" y=\"140\" class=\"ann-i\" font-size=\"13\">then smart-text,<\u002Ftext>\n        <text x=\"770\" y=\"160\" class=\"ann-i\" font-size=\"13\">else local.<\u002Ftext>\n      <\u002Fg>\n      <defs>\n        <marker id=\"pa\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--rust)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"pb\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"pc\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ochre)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <div class=\"figcap\"><b>Fig. P<\u002Fb> &nbsp;·&nbsp; <code class=\"inline\" style=\"font-size:0.85em;\">_classify()<\u002Fcode> → local | direct_api | escalated, each streamed back the same way.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- when it earns its keep -->\n  <div class=\"twocol\" style=\"margin-top: 44px; gap: 36px;\">\n    <div>\n      <h3 class=\"sub\">Two cases that earn the third route<\u002Fh3>\n      <ul class=\"bullets\" style=\"margin-top:10px;\">\n        <li><b>Latency &amp; cost.<\u002Fb> A one-hop API answer beats booting the full Claude Code agent — tool loop, repo read, test run — for a question that yields no diff.<\u002Fli>\n        <li><b>Resilience.<\u002Fb> With the Pi powered down, smart-text answers keep working over the API; the device isn't reduced to just the 0.5B. The local tier still covers offline.<\u002Fli>\n      <\u002Ful>\n      <p style=\"font-size:13px; margin-top:14px;\">Each path also backstops a different failure: lose the <em>internet<\u002Fem> and local still answers; lose the <em>Pi<\u002Fem> and the API still answers.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">The cost you accept<\u002Fh3>\n      <div class=\"callout\" style=\"margin-top:6px; border-color: var(--rust);\">The third route means <code class=\"inline\">CLAUDE_API_KEY<\u002Fcode> now lives in the Core's <em>flash<\u002Fem> — a second key surface beside the Pi's. Worth it only if surviving a Pi outage matters to you.<\u002Fdiv>\n      <p style=\"font-size:13px; margin-top:14px;\">If it doesn't, keep <code class=\"inline\">ROUTER_DIRECT_API<\u002Fcode> <b>off<\u002Fb> and let the Pi orchestrator own every cloud call — the Core then holds no key at all. That's the safer default; the third route is opt-in.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- two architectures -->\n  <h3 class=\"sub\" style=\"margin-top: 48px;\">Two ways to place the three routes<\u002Fh3>\n  <div class=\"twocol\" style=\"margin-top: 16px; gap: 0;\">\n    <div class=\"ledger-col\" style=\"border:1px solid var(--rule); border-radius:4px 0 0 4px;\">\n      <h4 style=\"color:#4F7A4A;\">Preferred · key stays on the Pi<\u002Fh4>\n      <p style=\"font-size:13px; margin:0 0 10px;\">The Core only ever calls the Pi. The orchestrator does the three-way itself — local-via-Core, direct-API, or Claude Code. The Core holds no key.<\u002Fp>\n      <p style=\"font-size:12.5px; color:var(--muted); margin:0;\">Simplest and safest. The trade: the direct-API path dies when the Pi is off.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"ledger-col\" style=\"border:1px solid var(--rule); border-left:none; border-radius:0 4px 4px 0; background:var(--paper-2);\">\n      <h4 style=\"color:var(--ochre);\">Resilience · key on the Core<\u002Fh4>\n      <p style=\"font-size:13px; margin:0 0 10px;\">Register both <code class=\"inline\">NetDevice_ClaudeAPI<\u002Fcode> and <code class=\"inline\">NetDevice_Router<\u002Fcode> on the Core; the router gains a third branch that calls the API plugin directly.<\u002Fp>\n      <p style=\"font-size:12.5px; color:var(--muted); margin:0;\">Survives a Pi outage — at the cost of the key in flash. This is “A + B truly together on the device.”<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <pre class=\"code\" style=\"margin-top: 32px;\"><span class=\"lbl\">M5Stack_I2C_Framework.ino — resilience wiring<\u002Fspan><span class=\"c\">// Config.h:  #define ROUTER_DIRECT_API true<\u002Fspan>\n<span class=\"k\">auto<\u002Fspan>* llm = <span class=\"k\">new<\u002Fspan> UartDevice_ModuleLLM(Serial2, 115200);\n<span class=\"k\">auto<\u002Fspan>* api = <span class=\"k\">new<\u002Fspan> NetDevice_ClaudeAPI();          <span class=\"c\">// the direct route<\u002Fspan>\nfw.addPlugin(llm);\nfw.addPlugin(api);\nfw.addPlugin(<span class=\"k\">new<\u002Fspan> NetDevice_Router(llm, api));      <span class=\"c\">// local + direct + escalate<\u002Fspan><\u002Fpre>\n  <p style=\"font-size:12.5px; color:var(--muted); margin-top:14px; max-width:72ch;\">The router drives <em>both<\u002Fem> the Module LLM and the Claude-API plugin through their public <code class=\"inline\">command()<\u002Fcode>/<code class=\"inline\">toJson()<\u002Fcode> — same decoupled mirror it already uses — so the third route added no new transport code, just one more branch in <code class=\"inline\">_classify()<\u002Fcode>. Tune what counts as “smart text” with <code class=\"inline\">ROUTER_DIRECT_KEYWORDS<\u002Fcode> and <code class=\"inline\">ROUTER_DIRECT_MIN_WORDS<\u002Fcode> in Config.h.<\u002Fp>\n<\u002Fsection>\n\n<footer class=\"foot\">\n  <div>LOCAL LLM &nbsp;·&nbsp; CLAUDE CODE &nbsp;·&nbsp; A QUIET HANDOFF<\u002Fdiv>\n  <div>v1 &nbsp;·&nbsp; 2026<\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
