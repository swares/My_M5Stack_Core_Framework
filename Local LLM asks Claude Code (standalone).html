  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ding: 0; }\n  body {\n    background: var(--paper);\n    color: var(--ink);\n    font-family: \"Geist\", -apple-system, system-ui, sans-serif;\n    font-size: 15.5px;\n    line-height: 1.55;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n\n  .page {\n    max-width: 1180px;\n    margin: 0 auto;\n    padding: 80px 56px 120px;\n  }\n\n  /* ─── Typography ─────────────────────────────────────────── */\n  .eyebrow {\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 11.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n    font-weight: 500;\n  }\n  h1.display {\n    font-family: \"Instrument Serif\", \"Iowan Old Style\", Georgia, serif;\n    font-weight: 400;\n    font-size: clamp(44px, 6vw, 76px);\n    line-height: 1.02;\n    letter-spacing: -0.01em;\n    margin: 18px 0 22px;\n    max-width: 18ch;\n  }\n  h1.display em { font-style: italic; color: var(--rust); }\n  .lede {\n    font-family: \"Instrument Serif\", Georgia, serif;\n    font-size: clamp(20px, 1.7vw, 24px);\n    line-height: 1.45;\n    color: var(--ink-2);\n    max-width: 58ch;\n    margin: 0;\n  }\n\n  h2.section {\n    font-family: \"Instrument Serif\", Georgia, serif;\n    font-weight: 400;\n    font-size: clamp(30px, 3.4vw, 44px);\n    line-height: 1.08;\n    letter-spacing: -0.005em;\n    margin: 0 0 8px;\n    color: var(--ink);\n  }\n  h2.section .num {\n    font-family: \"Geist Mono\", monospace;\n    font-size: 0.32em;\n    letter-spacing: 0.16em;\n    color: var(--muted);\n    vertical-align: 0.9em;\n    margin-right: 14px;\n    font-weight: 500;\n  }\n  h3.sub {\n    font-family: \"Geist\", sans-serif;\n    font-weight: 600;\n    font-size: 14px;\n    letter-spacing: 0.02em;\n    margin: 0 0 10px;\n    color: var(--ink);\n  }\n  p { margin: 0 0 14px; max-width: 64ch; color: var(--ink-2); }\n  p.tight { margin-bottom: 6px; }\n  p .em { font-style: italic; font-family: \"Instrument Serif\", serif; font-size: 1.08em; color: var(--ink); }\n\n  /* ─── Layout primitives ─────────────────────────────────── */\n  section.block { margin-top: 96px; }\n  .head-row { display: flex; align-items: baseline; gap: 24px; margin-bottom: 28px; border-top: 1px solid var(--rule); padding-top: 20px; }\n  .head-row .tag {\n    font-family: \"Geist Mono\", monospace;\n    font-size: 11px; letter-spacing: 0.16em; text-transform: uppercase;\n    color: var(--muted);\n  }\n\n  .twocol { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: start; }\n  .threecol { display: grid; grid-template-columns: repeat(3, 1fr); gap: 28px; }\n  .fourcol { display: grid; grid-template-columns: repeat(4, 1fr); gap: 18px; }\n\n  /* ─── Header / hero block ───────────────────────────────── */\n  header.hero {\n    border-top: 1px solid var(--ink);\n    padding-top: 28px;\n    display: grid;\n    grid-template-columns: 1fr auto;\n    gap: 60px;\n    align-items: end;\n  }\n  .hero-meta {\n    font-family: \"Geist Mono\", monospace;\n    font-size: 11px;\n    color: var(--muted);\n    letter-spacing: 0.04em;\n    text-align: right;\n    line-height: 1.7;\n    white-space: nowrap;\n  }\n  .hero-meta b { color: var(--ink); font-weight: 500; }\n  .hero-glyph { margin-top: 56px; }\n\n  /* ─── Code blocks ───────────────────────────────────────── */\n  pre.code, code.inline {\n    font-family: \"Geist Mono\", ui-monospace, monospace;\n    font-size: 12.5px;\n    line-height: 1.55;\n  }\n  code.inline {\n    background: var(--paper-2);\n    border: 1px solid var(--rule);\n    padding: 1px 6px;\n    border-radius: 3px;\n    font-size: 12px;\n    color: var(--ink);\n  }\n  pre.code {\n    background: var(--code-bg);\n    color: var(--code-fg);\n    padding: 18px 20px;\n    border-radius: 4px;\n    overflow-x: auto;\n    margin: 0;\n  }\n  pre.code .c  { color: var(--code-mute); font-style: italic; }\n  pre.code .k  { color: var(--code-acc); }\n  pre.code .s  { color: #D3B26B; }\n  pre.code .n  { color: var(--code-acc2); }\n  pre.code .p  { color: #C7A8E0; }\n  pre.code .m  { color: #8A8378; }\n  pre.code .lbl {\n    display: block;\n    background: transparent;\n    color: var(--code-mute);\n    font-size: 10.5px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    border-bottom: 1px solid #2A2622;\n    padding: 0 0 10px;\n    margin: -2px 0 12px;\n  }\n\n  .code-card {\n    background: var(--code-bg);\n    border-radius: 4px;\n    padding: 18px 20px;\n  }\n  .code-card pre { padding: 0; background: transparent; }\n\n  /* ─── Mechanism cards ───────────────────────────────────── */\n  .mech {\n    border: 1px solid var(--rule);\n    background: var(--paper);\n    padding: 22px 22px 26px;\n    border-radius: 4px;\n    display: flex;\n    flex-direction: column;\n    gap: 14px;\n    min-width: 0;\n  }\n  .mech .head {\n    display: flex;\n    align-items: baseline;\n    justify-content: space-between;\n    gap: 8px;\n    border-bottom: 1px solid var(--rule);\n    padding-bottom: 12px;\n  }\n  .mech .num {\n    font-family: \"Geist Mono\", monospace;\n    color: var(--muted);\n    font-size: 10.5px;\n    letter-spacing: 0.18em;\n  }\n  .mech h4 {\n    font-family: \"Instrument Serif\", Georgia, serif;\n    font-weight: 400;\n    font-size: 22px;\n    line-height: 1.1;\n    margin: 0;\n  }\n  .mech .summary { font-size: 13.5px; color: var(--ink-2); margin: 0; }\n  .mech pre.code { font-size: 11.5px; padding: 14px 16px; }\n  .mech dl { margin: 0; display: grid; grid-template-columns: 70px 1fr; gap: 6px 12px; font-size: 12.5px; }\n  .mech dl dt {\n    font-family: \"Geist Mono\", monospace;\n    color: var(--muted); font-size: 10.5px; letter-spacing: 0.12em; text-transform: uppercase;\n    padding-top: 2px;\n  }\n  .mech dl dd { margin: 0; color: var(--ink-2); }\n\n  /* ─── Misc bits ─────────────────────────────────────────── */\n  .pill {\n    display: inline-flex; align-items: center; gap: 6px;\n    border: 1px solid var(--rule-strong);\n    padding: 2px 9px;\n    border-radius: 999px;\n    font-family: \"Geist Mono\", monospace;\n    font-size: 10.5px;\n    letter-spacing: 0.08em;\n    color: var(--ink-2);\n    background: var(--paper);\n  }\n  .pill .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink); }\n  .pill.rust .dot { background: var(--rust); }\n  .pill.petrol .dot { background: var(--petrol); }\n  .pill.user .dot { background: var(--user); }\n\n  ul.bullets { list-style: none; padding: 0; margin: 0 0 14px; }\n  ul.bullets li {\n    padding-left: 22px;\n    position: relative;\n    margin-bottom: 8px;\n    color: var(--ink-2);\n    max-width: 64ch;\n  }\n  ul.bullets li::before {\n    content: \"→\";\n    position: absolute; left: 0; top: 0;\n    color: var(--rust);\n    font-family: \"Geist Mono\", monospace;\n  }\n\n  .figcap {\n    font-family: \"Geist Mono\", monospace;\n    font-size: 10.5px;\n    letter-spacing: 0.14em;\n    text-transform: uppercase;\n    color: var(--muted);\n    margin-top: 14px;\n  }\n  .figcap b { color: var(--ink); font-weight: 500; }\n\n  .callout {\n    border-left: 2px solid var(--rust);\n    padding: 4px 0 4px 16px;\n    margin: 18px 0;\n    font-family: \"Instrument Serif\", Georgia, serif;\n    font-size: 19px;\n    line-height: 1.4;\n    color: var(--ink);\n    max-width: 60ch;\n  }\n\n  /* SVG diagram styling */\n  svg .lane-label { font-family: \"Geist Mono\", monospace; font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; }\n  svg .step-num { font-family: \"Geist Mono\", monospace; font-size: 10px; letter-spacing: 0.06em; fill: var(--muted); }\n  svg .step-text { font-family: \"Geist\", sans-serif; font-size: 12.5px; fill: var(--ink-2); }\n  svg .step-title { font-family: \"Geist\", sans-serif; font-size: 13px; font-weight: 600; fill: var(--ink); }\n  svg .ann { font-family: \"Geist Mono\", monospace; font-size: 10.5px; fill: var(--muted); }\n  svg .ann-i { font-family: \"Instrument Serif\", serif; font-size: 14px; font-style: italic; fill: var(--ink-2); }\n\n  /* model ranking rows */\n  .ranklist { display: flex; flex-direction: column; }\n  .rrow {\n    display: grid;\n    grid-template-columns: 26px 1fr auto;\n    gap: 4px 16px;\n    align-items: baseline;\n    padding: 14px 0;\n    border-top: 1px solid var(--rule);\n  }\n  .rrow:first-child { border-top: none; }\n  .rrank { font-family: \"Geist Mono\", monospace; font-size: 12px; color: var(--muted); }\n  .rname { font-family: \"Geist Mono\", monospace; font-size: 14px; color: var(--ink); font-weight: 500; }\n  .rname .sz { color: var(--muted); font-weight: 400; }\n  .rwhy { grid-column: 2 / 3; font-size: 13px; color: var(--ink-2); margin-top: 4px; max-width: 52ch; }\n  .rtag {\n    font-family: \"Geist Mono\", monospace;\n    font-size: 9.5px; letter-spacing: 0.12em; text-transform: uppercase;\n    padding: 3px 8px; border-radius: 999px; white-space: nowrap;\n    border: 1px solid var(--rule-strong); color: var(--ink-2);\n    align-self: center;\n  }\n  .rtag.pick { background: var(--rust); color: #F4F1EA; border-color: var(--rust); }\n  .rtag.pick.o { background: var(--ochre); border-color: var(--ochre); }\n  .rtag.alt  { background: var(--paper); color: var(--ink-2); }\n  .rtag.skip { background: var(--paper); color: var(--muted); border-style: dashed; }\n  .rmeta { grid-column: 2 / 3; display: flex; gap: 6px; flex-wrap: wrap; margin-top: 8px; }\n  .chip {\n    font-family: \"Geist Mono\", monospace; font-size: 9.5px; letter-spacing: 0.08em;\n    text-transform: uppercase; color: var(--muted);\n    border: 1px solid var(--rule); border-radius: 3px; padding: 2px 6px;\n  }\n  .chip b { color: var(--ink); font-weight: 500; }\n\n  /* honest-accounting two-col */\n  .ledger { border: 1px solid var(--rule); border-radius: 4px; overflow: hidden; }\n  .ledger-col { padding: 26px 28px; }\n  .ledger-col h4 {\n    font-family: \"Geist Mono\", monospace; font-size: 11px; letter-spacing: 0.14em;\n    text-transform: uppercase; margin: 0 0 18px; font-weight: 500;\n  }\n  .ledger-col ul { list-style: none; padding: 0; margin: 0; }\n  .ledger-col li { padding: 12px 0; border-top: 1px solid var(--rule); font-size: 13.5px; color: var(--ink-2); }\n  .ledger-col li:first-child { border-top: none; }\n  .ledger-col li b { color: var(--ink); font-weight: 600; display: block; margin-bottom: 2px; font-size: 13px; }\n\n  /* price tier cards */\n  .ptier { border: 1px solid var(--rule); border-radius: 4px; padding: 24px 22px 26px; display: flex; flex-direction: column; min-width: 0; }\n  .ptier .ptier-lab { font-family: \"Geist Mono\", monospace; font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); }\n  .ptier .ptier-name { font-family: \"Instrument Serif\", Georgia, serif; font-size: 24px; line-height: 1.1; margin: 6px 0 4px; }\n  .ptier .ptier-price { font-family: \"Geist Mono\", monospace; font-size: 22px; color: var(--ink); font-weight: 500; margin: 10px 0 2px; }\n  .ptier .ptier-price small { font-size: 12px; color: var(--muted); font-weight: 400; }\n  .ptier hr { border: none; border-top: 1px solid var(--rule); margin: 18px 0; }\n  .ptier dl { margin: 0; display: grid; grid-template-columns: 64px 1fr; gap: 8px 12px; font-size: 12.5px; }\n  .ptier dt { font-family: \"Geist Mono\", monospace; color: var(--muted); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding-top: 2px; }\n  .ptier dd { margin: 0; color: var(--ink-2); }\n  .ptier .verdict { margin-top: auto; padding-top: 18px; font-size: 13px; color: var(--ink); font-family: \"Instrument Serif\", serif; font-size: 16px; line-height: 1.35; }\n  .ptier.star { border-color: var(--ochre); border-width: 1.5px; }\n  .ptier.star .ptier-name { color: var(--ochre); }\n\n  /* effort table */\n  .erow { display: grid; grid-template-columns: 1.5fr auto 2fr; gap: 14px 22px; align-items: start; padding: 16px 0; border-top: 1px solid var(--rule); }\n  .erow:first-child { border-top: none; }\n  .ecomp { font-weight: 600; color: var(--ink); font-size: 14px; }\n  .ecomp small { display: block; font-weight: 400; color: var(--muted); font-family: \"Geist Mono\", monospace; font-size: 10.5px; letter-spacing: 0.04em; margin-top: 4px; line-height: 1.4; }\n  .epain { font-size: 13px; color: var(--ink-2); align-self: center; }\n  .ebadge { font-family: \"Geist Mono\", monospace; font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 4px 9px; border-radius: 999px; white-space: nowrap; color: #F4F1EA; align-self: center; }\n  .ebadge.easy { background: #4F7A4A; }\n  .ebadge.mod  { background: var(--ochre); }\n  .ebadge.hard { background: var(--rust); }\n\n  /* footer */\n  footer.foot {\n    margin-top: 120px;\n    padding-top: 28px;\n    border-top: 1px solid var(--ink);\n    display: flex;\n    justify-content: space-between;\n    font-family: \"Geist Mono\", monospace;\n    font-size: 11px;\n    letter-spacing: 0.06em;\n    color: var(--muted);\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"page\">\n\n<!-- ════════════════ HERO ════════════════ -->\n<header class=\"hero\">\n  <div>\n    <div class=\"eyebrow\">Pattern · Local-first chat with selective escalation<\u002Fdiv>\n    <h1 class=\"display\">Asking Claude&nbsp;Code <em>for&nbsp;help.<\u002Fem><\u002Fh1>\n    <p class=\"lede\">A local model in Ollama handles ordinary chat on your machine. When a turn needs to read files, run commands, or reason across a codebase, it hands off — quietly, in the background — to Claude Code, then stitches the answer back into the conversation.<\u002Fp>\n  <\u002Fdiv>\n  <div class=\"hero-meta\">\n    <div><b>FRONT-END<\u002Fb> &nbsp;M5Stack CoreS3 · AX630C<\u002Fdiv>\n    <div><b>BRAIN<\u002Fb> &nbsp;2× Orange Pi 5 Pro · RK3588S<\u002Fdiv>\n    <div><b>SPECIALIST<\u002Fb> &nbsp;claude code (headless)<\u002Fdiv>\n    <div style=\"margin-top:10px;\">Three tiers · One chat surface<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- ════════════════ §0 ACTORS ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 00<\u002Fspan>\n    <span class=\"tag\">The three actors<\u002Fspan>\n  <\u002Fdiv>\n  <div class=\"twocol\">\n    <div>\n      <h2 class=\"section\"><span class=\"num\">A<\u002Fspan>Who's in the room.<\u002Fh2>\n      <p>One chat window, three minds behind it. The user never has to know where any given answer came from — that's the contract.<\u002Fp>\n      <ul class=\"bullets\">\n        <li><b>User<\u002Fb> — types in a normal chat box, expects normal turn‑taking.<\u002Fli>\n        <li><b>Ollama<\u002Fb> — fast, cheap, on‑device. Owns the conversation: tone, memory, formatting, the decision of when to call for help.<\u002Fli>\n        <li><b>Claude Code<\u002Fb> — runs headless in the background. Has shell, filesystem, and stronger reasoning. Returns a transcript or a structured result.<\u002Fli>\n      <\u002Ful>\n      <div class=\"callout\">Ollama is the host. Claude Code is the specialist on call. The user only ever talks to the host.<\u002Fdiv>\n    <\u002Fdiv>\n    <svg viewBox=\"0 0 540 360\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <!-- user -->\n      <circle cx=\"80\" cy=\"180\" r=\"36\" fill=\"none\" stroke=\"var(--user)\" stroke-width=\"1.5\"><\u002Fcircle>\n      <text x=\"80\" y=\"184\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--user)\">USER<\u002Ftext>\n      <text x=\"80\" y=\"240\" text-anchor=\"middle\" class=\"ann\">one chat surface<\u002Ftext>\n\n      <!-- ollama -->\n      <rect x=\"200\" y=\"120\" width=\"140\" height=\"120\" fill=\"none\" stroke=\"var(--rust)\" stroke-width=\"1.5\"><\u002Frect>\n      <text x=\"270\" y=\"155\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--rust)\">OLLAMA<\u002Ftext>\n      <text x=\"270\" y=\"178\" text-anchor=\"middle\" class=\"step-text\">host model<\u002Ftext>\n      <text x=\"270\" y=\"196\" text-anchor=\"middle\" class=\"step-text\">local · fast · cheap<\u002Ftext>\n      <text x=\"270\" y=\"218\" text-anchor=\"middle\" class=\"ann\">router + voice<\u002Ftext>\n\n      <!-- claude -->\n      <rect x=\"400\" y=\"100\" width=\"120\" height=\"160\" fill=\"none\" stroke=\"var(--petrol)\" stroke-width=\"1.5\" stroke-dasharray=\"3 4\"><\u002Frect>\n      <text x=\"460\" y=\"135\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--petrol)\">CLAUDE<\u002Ftext>\n      <text x=\"460\" y=\"152\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--petrol)\">CODE<\u002Ftext>\n      <text x=\"460\" y=\"178\" text-anchor=\"middle\" class=\"step-text\">headless<\u002Ftext>\n      <text x=\"460\" y=\"196\" text-anchor=\"middle\" class=\"step-text\">tools · shell · fs<\u002Ftext>\n      <text x=\"460\" y=\"222\" text-anchor=\"middle\" class=\"ann\">specialist<\u002Ftext>\n      <text x=\"460\" y=\"238\" text-anchor=\"middle\" class=\"ann\">on call<\u002Ftext>\n\n      <!-- arrows -->\n      <g stroke=\"var(--ink-2)\" stroke-width=\"1\" fill=\"none\">\n        <path d=\"M118 180 L198 180\" marker-end=\"url(#arr)\"><\u002Fpath>\n        <path d=\"M198 192 L118 192\" marker-end=\"url(#arr)\"><\u002Fpath>\n        <path d=\"M342 158 L398 138\" marker-end=\"url(#arr)\"><\u002Fpath>\n        <path d=\"M398 222 L342 202\" marker-end=\"url(#arr)\"><\u002Fpath>\n      <\u002Fg>\n\n      <text x=\"158\" y=\"172\" class=\"ann\">ask<\u002Ftext>\n      <text x=\"148\" y=\"206\" class=\"ann\">reply<\u002Ftext>\n      <text x=\"350\" y=\"135\" class=\"ann\">escalate<\u002Ftext>\n      <text x=\"350\" y=\"232\" class=\"ann\">result<\u002Ftext>\n\n      <!-- dashed background frame \"your machine\" -->\n      <rect x=\"40\" y=\"60\" width=\"360\" height=\"240\" rx=\"2\" fill=\"none\" stroke=\"var(--rule-strong)\" stroke-dasharray=\"2 4\"><\u002Frect>\n      <text x=\"48\" y=\"78\" class=\"ann\">YOUR MACHINE<\u002Ftext>\n      <text x=\"412\" y=\"78\" class=\"ann\">ANTHROPIC API<\u002Ftext>\n\n      <defs>\n        <marker id=\"arr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\">\n          <path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath>\n        <\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §1 LIFECYCLE ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 01<\u002Fspan>\n    <span class=\"tag\">Lifecycle of one escalated turn<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:24ch;\"><span class=\"num\">B<\u002Fspan>From a chat message to a Claude&nbsp;Code answer, and back.<\u002Fh2>\n  <p style=\"max-width:62ch;\">Read this as a swimlane: time flows left to right, lanes are the actors, numbered blocks are the steps of a single user turn. Steps&nbsp;1–3 happen on‑device in milliseconds; step&nbsp;4 is the long one.<\u002Fp>\n\n  <div style=\"margin-top:32px; padding: 28px 12px 18px; background: var(--paper-2); border-radius: 4px;\">\n    <svg viewBox=\"0 0 1100 460\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <!-- lane backgrounds -->\n      <g>\n        <rect x=\"0\" y=\"40\" width=\"1100\" height=\"110\" fill=\"#EFE9DC\"><\u002Frect>\n        <rect x=\"0\" y=\"170\" width=\"1100\" height=\"140\" fill=\"#F1E4DE\"><\u002Frect>\n        <rect x=\"0\" y=\"330\" width=\"1100\" height=\"110\" fill=\"#DEE7EC\"><\u002Frect>\n      <\u002Fg>\n      <!-- lane labels -->\n      <text x=\"14\" y=\"58\" class=\"lane-label\" fill=\"var(--user)\">USER<\u002Ftext>\n      <text x=\"14\" y=\"188\" class=\"lane-label\" fill=\"var(--rust)\">OLLAMA<\u002Ftext>\n      <text x=\"14\" y=\"348\" class=\"lane-label\" fill=\"var(--petrol)\">CLAUDE&nbsp;CODE<\u002Ftext>\n\n      <!-- timeline ticks -->\n      <g stroke=\"var(--rule-strong)\" stroke-width=\"1\" stroke-dasharray=\"2 5\">\n        <line x1=\"160\" y1=\"30\" x2=\"160\" y2=\"450\"><\u002Fline>\n        <line x1=\"320\" y1=\"30\" x2=\"320\" y2=\"450\"><\u002Fline>\n        <line x1=\"500\" y1=\"30\" x2=\"500\" y2=\"450\"><\u002Fline>\n        <line x1=\"740\" y1=\"30\" x2=\"740\" y2=\"450\"><\u002Fline>\n        <line x1=\"920\" y1=\"30\" x2=\"920\" y2=\"450\"><\u002Fline>\n      <\u002Fg>\n      <g class=\"step-num\" text-anchor=\"middle\">\n        <text x=\"160\" y=\"22\">t0<\u002Ftext>\n        <text x=\"320\" y=\"22\">+50ms<\u002Ftext>\n        <text x=\"500\" y=\"22\">+200ms<\u002Ftext>\n        <text x=\"740\" y=\"22\">+3-30s<\u002Ftext>\n        <text x=\"920\" y=\"22\">+stream<\u002Ftext>\n      <\u002Fg>\n\n      <!-- 1. User asks -->\n      <g>\n        <rect x=\"90\" y=\"70\" width=\"140\" height=\"60\" rx=\"3\" fill=\"white\" stroke=\"var(--user)\" stroke-width=\"1.2\"><\u002Frect>\n        <text x=\"100\" y=\"88\" class=\"step-num\">01<\u002Ftext>\n        <text x=\"100\" y=\"104\" class=\"step-title\">User asks.<\u002Ftext>\n        <text x=\"100\" y=\"121\" class=\"step-text\">“Refactor auth/”<\u002Ftext>\n      <\u002Fg>\n\n      <!-- arrow down to ollama -->\n      <path d=\"M160 130 L160 175\" stroke=\"var(--user)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#arrU)\"><\u002Fpath>\n\n      <!-- 2. Classify -->\n      <g>\n        <rect x=\"250\" y=\"200\" width=\"140\" height=\"80\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.2\"><\u002Frect>\n        <text x=\"260\" y=\"218\" class=\"step-num\">02<\u002Ftext>\n        <text x=\"260\" y=\"234\" class=\"step-title\">Classify.<\u002Ftext>\n        <text x=\"260\" y=\"252\" class=\"step-text\">Can I handle this<\u002Ftext>\n        <text x=\"260\" y=\"268\" class=\"step-text\">in‑house?<\u002Ftext>\n      <\u002Fg>\n      <text x=\"320\" y=\"298\" class=\"ann-i\" text-anchor=\"middle\">no — needs fs + tools<\u002Ftext>\n\n      <!-- 3. Pack context -->\n      <g>\n        <rect x=\"430\" y=\"200\" width=\"140\" height=\"80\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.2\"><\u002Frect>\n        <text x=\"440\" y=\"218\" class=\"step-num\">03<\u002Ftext>\n        <text x=\"440\" y=\"234\" class=\"step-title\">Pack context.<\u002Ftext>\n        <text x=\"440\" y=\"252\" class=\"step-text\">goal + workdir +<\u002Ftext>\n        <text x=\"440\" y=\"268\" class=\"step-text\">conv summary<\u002Ftext>\n      <\u002Fg>\n\n      <!-- arrow ollama → claude -->\n      <path d=\"M500 285 L500 330\" stroke=\"var(--rust)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#arrR)\"><\u002Fpath>\n      <text x=\"510\" y=\"312\" class=\"ann\">spawn / call<\u002Ftext>\n\n      <!-- 4. Claude works -->\n      <g>\n        <rect x=\"650\" y=\"350\" width=\"200\" height=\"76\" rx=\"3\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.2\"><\u002Frect>\n        <text x=\"660\" y=\"368\" class=\"step-num\">04<\u002Ftext>\n        <text x=\"660\" y=\"384\" class=\"step-title\">Read · plan · edit · test.<\u002Ftext>\n        <text x=\"660\" y=\"402\" class=\"step-text\">tool loop on the repo<\u002Ftext>\n        <text x=\"660\" y=\"418\" class=\"step-text\">streams stdout (JSON)<\u002Ftext>\n      <\u002Fg>\n\n      <!-- 5. Stream back: paraphrase -->\n      <g>\n        <rect x=\"860\" y=\"200\" width=\"160\" height=\"80\" rx=\"3\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.2\" stroke-dasharray=\"3 3\"><\u002Frect>\n        <text x=\"870\" y=\"218\" class=\"step-num\">05<\u002Ftext>\n        <text x=\"870\" y=\"234\" class=\"step-title\">Paraphrase progress.<\u002Ftext>\n        <text x=\"870\" y=\"252\" class=\"step-text\">“Reading 4 files…”<\u002Ftext>\n        <text x=\"870\" y=\"268\" class=\"step-text\">“Writing tests…”<\u002Ftext>\n      <\u002Fg>\n      <path d=\"M860 388 L940 388 L940 285\" stroke=\"var(--petrol)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#arrP)\"><\u002Fpath>\n      <text x=\"950\" y=\"320\" class=\"ann\">stream-json<\u002Ftext>\n\n      <!-- 6. Final answer to user -->\n      <g>\n        <rect x=\"900\" y=\"70\" width=\"180\" height=\"60\" rx=\"3\" fill=\"white\" stroke=\"var(--user)\" stroke-width=\"1.2\"><\u002Frect>\n        <text x=\"910\" y=\"88\" class=\"step-num\">06<\u002Ftext>\n        <text x=\"910\" y=\"104\" class=\"step-title\">User reads diff + summary.<\u002Ftext>\n        <text x=\"910\" y=\"121\" class=\"step-text\">in the same chat window<\u002Ftext>\n      <\u002Fg>\n      <path d=\"M940 200 L940 130\" stroke=\"var(--rust)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#arrU)\"><\u002Fpath>\n\n      <defs>\n        <marker id=\"arrU\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--user)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"arrR\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--rust)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"arrP\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <div class=\"figcap\"><b>Fig. B<\u002Fb> &nbsp;·&nbsp; one user turn, six steps, three lanes<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §2 DECIDING TO ESCALATE ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 02<\u002Fspan>\n    <span class=\"tag\">The escalation decision<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:22ch;\"><span class=\"num\">C<\u002Fspan>How Ollama knows it's out of its depth.<\u002Fh2>\n  <p>Two strategies, used together in practice. The cheap one runs first; the expensive one — Ollama itself — only fires if the heuristic is ambiguous.<\u002Fp>\n\n  <div class=\"twocol\" style=\"margin-top: 32px; gap: 36px;\">\n    <!-- Heuristic -->\n    <div>\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom: 10px;\">\n        <span class=\"pill rust\"><span class=\"dot\"><\u002Fspan>STRATEGY A<\u002Fspan>\n        <span style=\"font-family:Geist Mono,monospace;font-size:11px;color:var(--muted);\">cheap · ~0 ms<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:17px; margin-bottom: 6px;\">Heuristic prefilter<\u002Fh3>\n      <p class=\"tight\">Regex / keyword pass on the incoming message. Fast, dumb, conservative — biased toward escalating, because escalating something easy is cheaper than missing something hard.<\u002Fp>\n      <pre class=\"code\"><span class=\"lbl\">router/heuristic.py<\u002Fspan><span class=\"k\">def<\u002Fspan> <span class=\"n\">needs_claude<\u002Fspan>(msg, ctx):\n    <span class=\"c\"># obvious tells<\u002Fspan>\n    <span class=\"k\">if<\u002Fspan> ctx.attached_files: <span class=\"k\">return<\u002Fspan> <span class=\"p\">True<\u002Fspan>\n    <span class=\"k\">if<\u002Fspan> re.search(<span class=\"s\">r\"\\b(refactor|rewrite|debug|test|run|grep)\\b\"<\u002Fspan>, msg, re.I):\n        <span class=\"k\">return<\u002Fspan> <span class=\"p\">True<\u002Fspan>\n    <span class=\"k\">if<\u002Fspan> re.search(<span class=\"s\">r\"\\.(py|ts|tsx|go|rs|java|sql)\\b\"<\u002Fspan>, msg):\n        <span class=\"k\">return<\u002Fspan> <span class=\"p\">True<\u002Fspan>\n    <span class=\"k\">if<\u002Fspan> re.search(<span class=\"s\">r\"[/~]\\S+/\"<\u002Fspan>, msg):  <span class=\"c\"># paths<\u002Fspan>\n        <span class=\"k\">return<\u002Fspan> <span class=\"p\">True<\u002Fspan>\n    <span class=\"k\">return<\u002Fspan> <span class=\"p\">None<\u002Fspan>  <span class=\"c\"># inconclusive → ask the model<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n\n    <!-- Tool-call -->\n    <div>\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom: 10px;\">\n        <span class=\"pill rust\"><span class=\"dot\"><\u002Fspan>STRATEGY B<\u002Fspan>\n        <span style=\"font-family:Geist Mono,monospace;font-size:11px;color:var(--muted);\">model-judged · 1 token<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:17px; margin-bottom: 6px;\">Ollama as the router<\u002Fh3>\n      <p class=\"tight\">Expose <code class=\"inline\">escalate_to_claude_code<\u002Fcode> as a tool. Ollama either answers itself, or emits a tool call whose arguments <em>are<\u002Fem> the handoff payload. No separate classifier needed.<\u002Fp>\n      <pre class=\"code\"><span class=\"lbl\">tools/escalate.json<\u002Fspan>{\n  <span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"function\"<\u002Fspan>,\n  <span class=\"n\">\"function\"<\u002Fspan>: {\n    <span class=\"n\">\"name\"<\u002Fspan>: <span class=\"s\">\"escalate_to_claude_code\"<\u002Fspan>,\n    <span class=\"n\">\"description\"<\u002Fspan>: <span class=\"s\">\"Hand off to Claude Code when the task<\u002Fspan>\n<span class=\"s\">      needs filesystem access, shell, multi-file<\u002Fspan>\n<span class=\"s\">      reasoning, or careful code changes.\"<\u002Fspan>,\n    <span class=\"n\">\"parameters\"<\u002Fspan>: {\n      <span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"object\"<\u002Fspan>,\n      <span class=\"n\">\"required\"<\u002Fspan>: [<span class=\"s\">\"goal\"<\u002Fspan>, <span class=\"s\">\"why\"<\u002Fspan>],\n      <span class=\"n\">\"properties\"<\u002Fspan>: {\n        <span class=\"n\">\"goal\"<\u002Fspan>:    {<span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"string\"<\u002Fspan>},\n        <span class=\"n\">\"why\"<\u002Fspan>:     {<span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"string\"<\u002Fspan>},\n        <span class=\"n\">\"workdir\"<\u002Fspan>: {<span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"string\"<\u002Fspan>},\n        <span class=\"n\">\"files\"<\u002Fspan>:   {<span class=\"n\">\"type\"<\u002Fspan>: <span class=\"s\">\"array\"<\u002Fspan>}\n      }\n    }\n  }\n}<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 32px;\">A good system prompt for Ollama is one paragraph: <em>“You have a colleague named Claude Code who lives on the other side of a tool call. Hand off anything that touches files, shells, or more than one part of a codebase. Don't apologize for handing off.”<\u002Fem><\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §3 THE HANDOFF PAYLOAD + PROMPT ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 03<\u002Fspan>\n    <span class=\"tag\">What gets sent across<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:24ch;\"><span class=\"num\">D<\u002Fspan>The handoff payload, and the prompt it becomes.<\u002Fh2>\n  <p style=\"max-width:62ch;\">Whatever the transport mechanism, the <em>contents<\u002Fem> of the handoff are the same shape. Treat it as a small contract between the two models: structured on the wire, prose by the time it hits Claude Code.<\u002Fp>\n\n  <div class=\"twocol\" style=\"margin-top: 28px; gap: 36px;\">\n    <div>\n      <h3 class=\"sub\">Payload (the wire format)<\u002Fh3>\n      <p class=\"tight\" style=\"font-size:13.5px;\">What Ollama assembles before calling out. Five fields, in priority order.<\u002Fp>\n      <pre class=\"code\"><span class=\"lbl\">handoff.json<\u002Fspan>{\n  <span class=\"n\">\"goal\"<\u002Fspan>: <span class=\"s\">\"Add rate limiting to the /login route<\u002Fspan>\n<span class=\"s\">           and write a test that proves it triggers<\u002Fspan>\n<span class=\"s\">           after 5 attempts in 60s.\"<\u002Fspan>,\n\n  <span class=\"n\">\"workdir\"<\u002Fspan>: <span class=\"s\">\"/Users/me/code/acme-api\"<\u002Fspan>,\n\n  <span class=\"n\">\"conversation_summary\"<\u002Fspan>: <span class=\"s\">\"User is debugging<\u002Fspan>\n<span class=\"s\">     brute-force logins seen in prod. Stack is<\u002Fspan>\n<span class=\"s\">     Express + Redis. They tried a naive in-memory<\u002Fspan>\n<span class=\"s\">     counter; want something Redis-backed.\"<\u002Fspan>,\n\n  <span class=\"n\">\"attached_files\"<\u002Fspan>: [\n    <span class=\"s\">\"src/routes/login.ts\"<\u002Fspan>,\n    <span class=\"s\">\"src/middleware/\"<\u002Fspan>\n  ],\n\n  <span class=\"n\">\"acceptance\"<\u002Fspan>: [\n    <span class=\"s\">\"new test passes locally\"<\u002Fspan>,\n    <span class=\"s\">\"no existing tests regress\"<\u002Fspan>,\n    <span class=\"s\">\"diff is &lt; 80 lines\"<\u002Fspan>\n  ]\n}<\u002Fpre>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">Prompt (what Claude Code actually reads)<\u002Fh3>\n      <p class=\"tight\" style=\"font-size:13.5px;\">Render the JSON into a brief, plain‑English brief. Don't dump the JSON itself.<\u002Fp>\n      <pre class=\"code\"><span class=\"lbl\">prompt.md<\u002Fspan><span class=\"c\"># Task<\u002Fspan>\nAdd rate limiting to the <span class=\"n\">/login<\u002Fspan> route and\nwrite a test that proves it triggers after 5\nattempts in 60s.\n\n<span class=\"c\"># Working directory<\u002Fspan>\n<span class=\"n\">/Users/me/code/acme-api<\u002Fspan>\n\n<span class=\"c\"># Context from the user's chat<\u002Fspan>\nThe user is debugging brute-force logins seen\nin prod. Stack: Express + Redis. They tried a\nnaive in-memory counter and want something\nRedis-backed.\n\n<span class=\"c\"># Likely-relevant paths<\u002Fspan>\n- <span class=\"n\">src/routes/login.ts<\u002Fspan>\n- <span class=\"n\">src/middleware/<\u002Fspan>\n\n<span class=\"c\"># Acceptance<\u002Fspan>\n- new test passes locally\n- no existing tests regress\n- diff is &lt; 80 lines\n\n<span class=\"c\"># Output<\u002Fspan>\nWhen done, print a one-paragraph summary\nfollowed by the unified diff.<\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"callout\" style=\"margin-top: 28px;\">The single biggest quality lever isn't the model — it's whether the <em>conversation_summary<\u002Fem> field is honest. Ollama saw the chat; Claude Code did not.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §4 FOUR MECHANISMS ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 04<\u002Fspan>\n    <span class=\"tag\">Four ways to actually make the call<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:22ch;\"><span class=\"num\">E<\u002Fspan>Pick a transport. Same payload, different plumbing.<\u002Fh2>\n  <p style=\"max-width:62ch;\">All four take the rendered prompt and return Claude Code's output. They differ in how much process / network you're willing to introduce, and whether you want streaming.<\u002Fp>\n\n  <div class=\"fourcol\" style=\"margin-top: 36px;\">\n    <!-- 1. CLI subprocess -->\n    <div class=\"mech\">\n      <div class=\"head\">\n        <h4>Spawn the CLI<\u002Fh4>\n        <span class=\"num\">M·01<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">Ollama's tool handler shells out to <code class=\"inline\">claude<\u002Fcode> with <code class=\"inline\">-p<\u002Fcode> (print mode) and reads stdout.<\u002Fp>\n      <pre class=\"code\"><span class=\"c\"># inside the tool handler<\u002Fspan>\nproc = subprocess.Popen(\n  [<span class=\"s\">\"claude\"<\u002Fspan>, <span class=\"s\">\"-p\"<\u002Fspan>, prompt,\n   <span class=\"s\">\"--output-format\"<\u002Fspan>,\n   <span class=\"s\">\"stream-json\"<\u002Fspan>],\n  cwd=workdir,\n  stdout=subprocess.PIPE)\n\n<span class=\"k\">for<\u002Fspan> line <span class=\"k\">in<\u002Fspan> proc.stdout:\n    event = json.loads(line)\n    forward(event)<\u002Fpre>\n      <dl>\n        <dt>Best<\u002Fdt><dd>single workstation, one user.<\u002Fdd>\n        <dt>Watch<\u002Fdt><dd>auth must be set up in the same shell; no isolation.<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <!-- 2. Headless on a file -->\n    <div class=\"mech\">\n      <div class=\"head\">\n        <h4>Headless on a prompt file<\u002Fh4>\n        <span class=\"num\">M·02<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">Write the rendered brief to <code class=\"inline\">task.md<\u002Fcode>, then pipe it in. Lets you keep prompts as artifacts.<\u002Fp>\n      <pre class=\"code\">Path(<span class=\"s\">\".cc/task.md\"<\u002Fspan>).write_text(prompt)\n\n<span class=\"c\"># cat into claude -p, JSON out<\u002Fspan>\n$ <span class=\"k\">cat<\u002Fspan> .cc/task.md \\\n    | claude -p \\\n    --output-format json \\\n    &gt; .cc/result.json<\u002Fpre>\n      <dl>\n        <dt>Best<\u002Fdt><dd>auditable runs, replay, CI.<\u002Fdd>\n        <dt>Watch<\u002Fdt><dd>not streaming by default — user waits.<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <!-- 3. MCP -->\n    <div class=\"mech\">\n      <div class=\"head\">\n        <h4>MCP bridge<\u002Fh4>\n        <span class=\"num\">M·03<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">Wrap Claude Code as an MCP server exposing one tool, <code class=\"inline\">delegate_task<\u002Fcode>. Any MCP‑aware host (incl. an Ollama wrapper) calls it.<\u002Fp>\n      <pre class=\"code\"><span class=\"c\"># server.py — fastmcp<\u002Fspan>\n<span class=\"k\">from<\u002Fspan> mcp.server <span class=\"k\">import<\u002Fspan> FastMCP\nmcp = FastMCP(<span class=\"s\">\"claude-code\"<\u002Fspan>)\n\n<span class=\"k\">@<\u002Fspan>mcp.tool()\n<span class=\"k\">def<\u002Fspan> <span class=\"n\">delegate_task<\u002Fspan>(prompt: <span class=\"p\">str<\u002Fspan>,\n                  workdir: <span class=\"p\">str<\u002Fspan>) -&gt; <span class=\"p\">str<\u002Fspan>:\n    <span class=\"k\">return<\u002Fspan> run_claude(prompt, workdir)\n\nmcp.run()<\u002Fpre>\n      <dl>\n        <dt>Best<\u002Fdt><dd>multi‑agent setups, multiple hosts.<\u002Fdd>\n        <dt>Watch<\u002Fdt><dd>extra hop; Ollama needs an MCP client wrapper.<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n\n    <!-- 4. HTTP -->\n    <div class=\"mech\">\n      <div class=\"head\">\n        <h4>HTTP wrapper<\u002Fh4>\n        <span class=\"num\">M·04<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">Tiny FastAPI service on <code class=\"inline\">:8787<\u002Fcode> that owns the Claude Code subprocess. Ollama just POSTs.<\u002Fp>\n      <pre class=\"code\"><span class=\"k\">@<\u002Fspan>app.post(<span class=\"s\">\"/delegate\"<\u002Fspan>)\n<span class=\"k\">async def<\u002Fspan> <span class=\"n\">delegate<\u002Fspan>(req: Brief):\n    <span class=\"k\">async for<\u002Fspan> ev <span class=\"k\">in<\u002Fspan> claude_stream(\n        req.prompt, cwd=req.workdir):\n        <span class=\"k\">yield<\u002Fspan> sse(ev)\n\n<span class=\"c\"># ollama tool handler:<\u002Fspan>\nrequests.post(\n  <span class=\"s\">\"http://localhost:8787/delegate\"<\u002Fspan>,\n  json=payload, stream=<span class=\"p\">True<\u002Fspan>)<\u002Fpre>\n      <dl>\n        <dt>Best<\u002Fdt><dd>team server, remote workstation, web UI.<\u002Fdd>\n        <dt>Watch<\u002Fdt><dd>you own the security boundary now.<\u002Fdd>\n      <\u002Fdl>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"figcap\" style=\"margin-top: 22px;\"><b>Fig. E<\u002Fb> &nbsp;·&nbsp; Same handoff payload, four transports. Cards are ordered from least to most plumbing.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §5 STREAMING BACK ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 05<\u002Fspan>\n    <span class=\"tag\">Stitching the answer back into the chat<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:22ch;\"><span class=\"num\">F<\u002Fspan>Don't make the user stare at a blank cursor.<\u002Fh2>\n  <p style=\"max-width:62ch;\">Claude Code's <code class=\"inline\">stream-json<\u002Fcode> output emits events as it works. Ollama's job is to translate those events into single‑sentence updates in the user's voice — not to forward them raw.<\u002Fp>\n\n  <div class=\"twocol\" style=\"margin-top: 28px; gap: 36px;\">\n    <div>\n      <h3 class=\"sub\">Raw stream from Claude Code<\u002Fh3>\n      <pre class=\"code\"><span class=\"lbl\">stdout · ndjson<\u002Fspan>{<span class=\"n\">\"type\"<\u002Fspan>:<span class=\"s\">\"tool_use\"<\u002Fspan>,<span class=\"n\">\"name\"<\u002Fspan>:<span class=\"s\">\"Read\"<\u002Fspan>,\n <span class=\"n\">\"path\"<\u002Fspan>:<span class=\"s\">\"src/routes/login.ts\"<\u002Fspan>}\n{<span class=\"n\">\"type\"<\u002Fspan>:<span class=\"s\">\"tool_use\"<\u002Fspan>,<span class=\"n\">\"name\"<\u002Fspan>:<span class=\"s\">\"Grep\"<\u002Fspan>,\n <span class=\"n\">\"pattern\"<\u002Fspan>:<span class=\"s\">\"rate.?limit\"<\u002Fspan>}\n{<span class=\"n\">\"type\"<\u002Fspan>:<span class=\"s\">\"tool_use\"<\u002Fspan>,<span class=\"n\">\"name\"<\u002Fspan>:<span class=\"s\">\"Edit\"<\u002Fspan>,\n <span class=\"n\">\"path\"<\u002Fspan>:<span class=\"s\">\"src/middleware/rateLimit.ts\"<\u002Fspan>}\n{<span class=\"n\">\"type\"<\u002Fspan>:<span class=\"s\">\"tool_use\"<\u002Fspan>,<span class=\"n\">\"name\"<\u002Fspan>:<span class=\"s\">\"Bash\"<\u002Fspan>,\n <span class=\"n\">\"cmd\"<\u002Fspan>:<span class=\"s\">\"npm test -- login\"<\u002Fspan>}\n{<span class=\"n\">\"type\"<\u002Fspan>:<span class=\"s\">\"assistant_text\"<\u002Fspan>,\n <span class=\"n\">\"text\"<\u002Fspan>:<span class=\"s\">\"All 14 tests pass. Diff below.\"<\u002Fspan>}<\u002Fpre>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">What the user sees in Ollama's chat<\u002Fh3>\n      <pre class=\"code\"><span class=\"lbl\">chat surface · user view<\u002Fspan><span class=\"c\">› Reading login.ts and<\u002Fspan>\n<span class=\"c\">  searching for existing rate limiters…<\u002Fspan>\n\n<span class=\"c\">› Drafting a new middleware<\u002Fspan>\n<span class=\"c\">  src/middleware/rateLimit.ts…<\u002Fspan>\n\n<span class=\"c\">› Running the login test suite…<\u002Fspan>\n\n<span class=\"c\">  All 14 tests pass.<\u002Fspan>\n<span class=\"c\">  Here's the diff:<\u002Fspan>\n\n  <span class=\"k\">+<\u002Fspan> import rateLimit from <span class=\"s\">\"./middleware/...<\u002Fspan>\n  <span class=\"k\">+<\u002Fspan> app.use(<span class=\"s\">\"/login\"<\u002Fspan>, rateLimit({ <span class=\"m\">...<\u002Fspan> }))\n  <span class=\"m\">...<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div style=\"margin-top: 32px;\" class=\"threecol\">\n    <div>\n      <h3 class=\"sub\">Translation pass<\u002Fh3>\n      <p style=\"font-size:13.5px;\">Each event becomes a single line, written by Ollama in the user's voice. The system prompt for this is two sentences: <em>“You are narrating a colleague's work. Use present continuous tense. Never quote raw tool names.”<\u002Fem><\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">Backpressure<\u002Fh3>\n      <p style=\"font-size:13.5px;\">Throttle to one update per ~800ms. Claude Code may emit dozens of events per second on a grep; the user only needs to know <em>something is happening<\u002Fem>.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <h3 class=\"sub\">Final stitch<\u002Fh3>\n      <p style=\"font-size:13.5px;\">When the stream closes, Ollama gets one more turn: re‑read the conversation, the user's last message, and Claude Code's final text — then write the closing answer itself. This is where tone and memory live.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §6 ONE-PAGE RECAP ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 06<\u002Fspan>\n    <span class=\"tag\">In one diagram<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:22ch;\"><span class=\"num\">G<\u002Fspan>The whole pattern, on a single page.<\u002Fh2>\n\n  <div style=\"margin-top: 32px; background: var(--paper-2); border-radius: 4px; padding: 32px 24px;\">\n    <svg viewBox=\"0 0 1100 380\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <!-- user -->\n      <g>\n        <circle cx=\"80\" cy=\"190\" r=\"34\" fill=\"white\" stroke=\"var(--user)\" stroke-width=\"1.5\"><\u002Fcircle>\n        <text x=\"80\" y=\"194\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--user)\">USER<\u002Ftext>\n      <\u002Fg>\n\n      <!-- ollama block (with router + voice halves) -->\n      <g>\n        <rect x=\"240\" y=\"80\" width=\"280\" height=\"220\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.5\"><\u002Frect>\n        <text x=\"380\" y=\"108\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--rust)\">OLLAMA  ·  HOST<\u002Ftext>\n        <line x1=\"240\" y1=\"125\" x2=\"520\" y2=\"125\" stroke=\"var(--rust)\" stroke-width=\"0.8\" stroke-dasharray=\"2 3\"><\u002Fline>\n\n        <text x=\"260\" y=\"150\" class=\"step-title\">router<\u002Ftext>\n        <text x=\"260\" y=\"170\" class=\"step-text\">heuristic prefilter<\u002Ftext>\n        <text x=\"260\" y=\"188\" class=\"step-text\">+ tool-call judge<\u002Ftext>\n\n        <line x1=\"240\" y1=\"210\" x2=\"520\" y2=\"210\" stroke=\"var(--rust)\" stroke-width=\"0.8\" stroke-dasharray=\"2 3\"><\u002Fline>\n\n        <text x=\"260\" y=\"232\" class=\"step-title\">voice<\u002Ftext>\n        <text x=\"260\" y=\"252\" class=\"step-text\">paraphrases progress<\u002Ftext>\n        <text x=\"260\" y=\"270\" class=\"step-text\">writes final answer<\u002Ftext>\n        <text x=\"260\" y=\"288\" class=\"step-text\">remembers conversation<\u002Ftext>\n      <\u002Fg>\n\n      <!-- handoff packet -->\n      <g>\n        <rect x=\"580\" y=\"155\" width=\"160\" height=\"90\" rx=\"3\" fill=\"white\" stroke=\"var(--ink-2)\" stroke-width=\"1\" stroke-dasharray=\"3 3\"><\u002Frect>\n        <text x=\"660\" y=\"174\" text-anchor=\"middle\" class=\"step-num\">HANDOFF · §03<\u002Ftext>\n        <text x=\"595\" y=\"192\" class=\"step-text\">goal<\u002Ftext>\n        <text x=\"595\" y=\"208\" class=\"step-text\">workdir<\u002Ftext>\n        <text x=\"595\" y=\"224\" class=\"step-text\">conv summary<\u002Ftext>\n        <text x=\"595\" y=\"240\" class=\"step-text\">files · acceptance<\u002Ftext>\n      <\u002Fg>\n\n      <!-- claude -->\n      <g>\n        <rect x=\"800\" y=\"80\" width=\"240\" height=\"220\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.5\" stroke-dasharray=\"4 5\"><\u002Frect>\n        <text x=\"920\" y=\"108\" text-anchor=\"middle\" class=\"lane-label\" fill=\"var(--petrol)\">CLAUDE CODE<\u002Ftext>\n        <text x=\"820\" y=\"140\" class=\"step-text\">headless · -p mode<\u002Ftext>\n        <text x=\"820\" y=\"160\" class=\"step-text\">tools: read · edit · bash · grep<\u002Ftext>\n        <text x=\"820\" y=\"180\" class=\"step-text\">streams ndjson to stdout<\u002Ftext>\n\n        <line x1=\"800\" y1=\"200\" x2=\"1040\" y2=\"200\" stroke=\"var(--petrol)\" stroke-width=\"0.6\" stroke-dasharray=\"2 3\"><\u002Fline>\n\n        <text x=\"820\" y=\"222\" class=\"step-text\">via one of:<\u002Ftext>\n        <text x=\"835\" y=\"242\" class=\"step-text\">· subprocess  (M·01)<\u002Ftext>\n        <text x=\"835\" y=\"258\" class=\"step-text\">· file + claude -p  (M·02)<\u002Ftext>\n        <text x=\"835\" y=\"274\" class=\"step-text\">· MCP server  (M·03)<\u002Ftext>\n        <text x=\"835\" y=\"290\" class=\"step-text\">· HTTP wrapper  (M·04)<\u002Ftext>\n      <\u002Fg>\n\n      <!-- arrows -->\n      <g stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\">\n        <path d=\"M114 184 L238 156\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n        <path d=\"M238 224 L114 196\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n        <path d=\"M520 192 L578 192\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n        <path d=\"M578 208 L520 208\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n        <path d=\"M740 192 L798 192\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n        <path d=\"M798 208 L740 208\" marker-end=\"url(#arrR2)\"><\u002Fpath>\n      <\u002Fg>\n\n      <text x=\"160\" y=\"148\" class=\"ann\">message<\u002Ftext>\n      <text x=\"170\" y=\"216\" class=\"ann\">reply<\u002Ftext>\n      <text x=\"538\" y=\"184\" class=\"ann\">brief<\u002Ftext>\n      <text x=\"538\" y=\"222\" class=\"ann\">events<\u002Ftext>\n      <text x=\"752\" y=\"184\" class=\"ann\">spawn<\u002Ftext>\n      <text x=\"752\" y=\"222\" class=\"ann\">stream<\u002Ftext>\n\n      <!-- machine boundary -->\n      <rect x=\"40\" y=\"60\" width=\"720\" height=\"280\" rx=\"2\" fill=\"none\" stroke=\"var(--rule-strong)\" stroke-dasharray=\"2 5\"><\u002Frect>\n      <text x=\"50\" y=\"78\" class=\"ann\">YOUR MACHINE  ·  on-device<\u002Ftext>\n      <text x=\"775\" y=\"78\" class=\"ann\">subprocess / api<\u002Ftext>\n\n      <defs>\n        <marker id=\"arrR2\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <div class=\"figcap\"><b>Fig. G<\u002Fb> &nbsp;·&nbsp; The host (Ollama) splits into router + voice. The specialist (Claude Code) is reached through one of four transports, all carrying the same brief.<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §7 YOUR HARDWARE ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 07<\u002Fspan>\n    <span class=\"tag\">Mapped onto your actual rig<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:26ch;\"><span class=\"num\">H<\u002Fspan>Your three boxes are already a three‑tier escalation ladder.<\u002Fh2>\n  <p style=\"max-width:64ch;\">The abstract pattern assumed one local model. You have <em>three machines<\u002Fem> at three capability levels — which is better. Each rung only escalates what it can't finish, so the tiny always‑on device never pays for the big reasoner, and the big reasoner never pays for the cloud unless it has to.<\u002Fp>\n\n  <div style=\"display:flex; gap:10px; flex-wrap:wrap; margin: 22px 0 8px;\">\n    <span class=\"pill rust\"><span class=\"dot\"><\u002Fspan>TIER 1 · FRONT-END &amp; REFLEX<\u002Fspan>\n    <span class=\"pill\" style=\"border-color:var(--ochre);\"><span class=\"dot\" style=\"background:var(--ochre);\"><\u002Fspan>TIER 2 · LOCAL BRAIN + ROUTER<\u002Fspan>\n    <span class=\"pill petrol\"><span class=\"dot\"><\u002Fspan>TIER 3 · CLOUD SPECIALIST<\u002Fspan>\n  <\u002Fdiv>\n\n  <!-- topology diagram -->\n  <div style=\"margin-top: 24px; background: var(--paper-2); border-radius: 4px; padding: 30px 22px 18px;\">\n    <svg viewBox=\"0 0 1120 420\" width=\"100%\" height=\"auto\" aria-hidden=\"true\">\n      <!-- chat in/out -->\n      <g>\n        <text x=\"22\" y=\"150\" class=\"ann\">you type<\u002Ftext>\n        <path d=\"M20 160 L92 178\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#a7)\"><\u002Fpath>\n        <text x=\"22\" y=\"262\" class=\"ann\">you read<\u002Ftext>\n        <path d=\"M92 240 L20 252\" stroke=\"var(--ink-2)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#a7)\"><\u002Fpath>\n      <\u002Fg>\n\n      <!-- TIER 1: CoreS3 -->\n      <g>\n        <rect x=\"100\" y=\"120\" width=\"180\" height=\"180\" rx=\"4\" fill=\"white\" stroke=\"var(--rust)\" stroke-width=\"1.5\"><\u002Frect>\n        <text x=\"116\" y=\"146\" class=\"lane-label\" fill=\"var(--rust)\">TIER 1<\u002Ftext>\n        <text x=\"116\" y=\"168\" class=\"step-title\">M5Stack CoreS3<\u002Ftext>\n        <text x=\"116\" y=\"186\" class=\"step-text\">+ LLM Module · AX630C<\u002Ftext>\n        <line x1=\"116\" y1=\"198\" x2=\"264\" y2=\"198\" stroke=\"var(--rust-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"116\" y=\"218\" class=\"step-text\">Qwen2.5‑0.5B<\u002Ftext>\n        <text x=\"116\" y=\"236\" class=\"step-text\">touchscreen chat UI<\u002Ftext>\n        <text x=\"116\" y=\"254\" class=\"step-text\">3.2 TOPS · 1.5 W<\u002Ftext>\n        <text x=\"116\" y=\"282\" class=\"ann\">handles reflexes,<\u002Ftext>\n        <text x=\"116\" y=\"296\" class=\"ann\">forwards real questions<\u002Ftext>\n      <\u002Fg>\n\n      <!-- arrow t1 -> t2 -->\n      <path d=\"M280 200 L348 200\" stroke=\"var(--ink-2)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#a7)\"><\u002Fpath>\n      <text x=\"286\" y=\"190\" class=\"ann\">LAN · OpenAI API<\u002Ftext>\n\n      <!-- TIER 2: two Orange Pis -->\n      <g>\n        <rect x=\"350\" y=\"84\" width=\"360\" height=\"252\" rx=\"4\" fill=\"none\" stroke=\"var(--ochre)\" stroke-width=\"1.2\" stroke-dasharray=\"3 4\"><\u002Frect>\n        <text x=\"366\" y=\"106\" class=\"lane-label\" fill=\"var(--ochre)\">TIER 2 · 2× ORANGE PI 5 PRO · RK3588S<\u002Ftext>\n\n        <!-- Pi #1 router -->\n        <rect x=\"366\" y=\"120\" width=\"158\" height=\"200\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.5\"><\u002Frect>\n        <text x=\"380\" y=\"142\" class=\"step-title\">Pi #1 — HOST<\u002Ftext>\n        <text x=\"380\" y=\"160\" class=\"step-text\">Qwen2.5‑7B<\u002Ftext>\n        <text x=\"380\" y=\"177\" class=\"step-text\">RKLLama · NPU<\u002Ftext>\n        <text x=\"380\" y=\"194\" class=\"step-text\">tool calling on<\u002Ftext>\n        <line x1=\"380\" y1=\"206\" x2=\"510\" y2=\"206\" stroke=\"var(--ochre-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"380\" y=\"226\" class=\"ann-i\">router<\u002Ftext>\n        <text x=\"380\" y=\"244\" class=\"step-text\">decides to escalate<\u002Ftext>\n        <text x=\"380\" y=\"262\" class=\"ann-i\">voice<\u002Ftext>\n        <text x=\"380\" y=\"280\" class=\"step-text\">owns the conversation<\u002Ftext>\n        <text x=\"380\" y=\"298\" class=\"step-text\">narrates progress<\u002Ftext>\n\n        <!-- Pi #2 worker -->\n        <rect x=\"536\" y=\"120\" width=\"158\" height=\"200\" rx=\"3\" fill=\"white\" stroke=\"var(--ochre)\" stroke-width=\"1.5\"><\u002Frect>\n        <text x=\"550\" y=\"142\" class=\"step-title\">Pi #2 — WORKER<\u002Ftext>\n        <text x=\"550\" y=\"160\" class=\"step-text\">Qwen2.5‑Coder<\u002Ftext>\n        <text x=\"550\" y=\"177\" class=\"step-text\">+ Whisper / embeds<\u002Ftext>\n        <line x1=\"550\" y1=\"189\" x2=\"680\" y2=\"189\" stroke=\"var(--ochre-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"550\" y=\"209\" class=\"step-text\">2nd opinion before<\u002Ftext>\n        <text x=\"550\" y=\"225\" class=\"step-text\">paying for cloud<\u002Ftext>\n        <text x=\"550\" y=\"251\" class=\"ann-i\">also runs:<\u002Ftext>\n        <text x=\"550\" y=\"271\" class=\"step-text\">claude code headless<\u002Ftext>\n        <text x=\"550\" y=\"287\" class=\"step-text\">(arm64) against a<\u002Ftext>\n        <text x=\"550\" y=\"303\" class=\"step-text\">local git checkout<\u002Ftext>\n\n        <!-- internal link -->\n        <path d=\"M524 250 L536 250\" stroke=\"var(--ochre)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#a7o)\"><\u002Fpath>\n        <path d=\"M536 264 L524 264\" stroke=\"var(--ochre)\" stroke-width=\"1.2\" fill=\"none\" marker-end=\"url(#a7o)\"><\u002Fpath>\n      <\u002Fg>\n\n      <!-- arrow t2 -> t3 -->\n      <path d=\"M710 180 L800 160\" stroke=\"var(--ink-2)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#a7)\"><\u002Fpath>\n      <text x=\"718\" y=\"150\" class=\"ann\">escalate · §03 brief<\u002Ftext>\n      <path d=\"M800 230 L710 250\" stroke=\"var(--petrol)\" stroke-width=\"1.4\" fill=\"none\" marker-end=\"url(#a7p)\"><\u002Fpath>\n      <text x=\"724\" y=\"252\" class=\"ann\">stream‑json back<\u002Ftext>\n\n      <!-- TIER 3: Claude Code cloud -->\n      <g>\n        <rect x=\"802\" y=\"120\" width=\"200\" height=\"160\" rx=\"4\" fill=\"white\" stroke=\"var(--petrol)\" stroke-width=\"1.5\" stroke-dasharray=\"4 5\"><\u002Frect>\n        <text x=\"818\" y=\"146\" class=\"lane-label\" fill=\"var(--petrol)\">TIER 3<\u002Ftext>\n        <text x=\"818\" y=\"168\" class=\"step-title\">Claude Code<\u002Ftext>\n        <text x=\"818\" y=\"186\" class=\"step-text\">Anthropic API<\u002Ftext>\n        <line x1=\"818\" y1=\"198\" x2=\"986\" y2=\"198\" stroke=\"var(--petrol-soft)\" stroke-width=\"1\"><\u002Fline>\n        <text x=\"818\" y=\"218\" class=\"step-text\">read · edit · bash · test<\u002Ftext>\n        <text x=\"818\" y=\"236\" class=\"step-text\">multi‑file reasoning<\u002Ftext>\n        <text x=\"818\" y=\"262\" class=\"ann\">the only hop that<\u002Ftext>\n        <text x=\"818\" y=\"276\" class=\"ann\">leaves your network<\u002Ftext>\n      <\u002Fg>\n\n      <!-- boundary -->\n      <rect x=\"80\" y=\"60\" width=\"700\" height=\"296\" rx=\"2\" fill=\"none\" stroke=\"var(--rule-strong)\" stroke-dasharray=\"2 5\"><\u002Frect>\n      <text x=\"90\" y=\"78\" class=\"ann\">YOUR NETWORK · ON‑PREM · OFFLINE‑CAPABLE<\u002Ftext>\n\n      <defs>\n        <marker id=\"a7\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ink-2)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"a7o\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--ochre)\"><\u002Fpath><\u002Fmarker>\n        <marker id=\"a7p\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"6\" markerHeight=\"6\" orient=\"auto\"><path d=\"M0,0 L10,5 L0,10 z\" fill=\"var(--petrol)\"><\u002Fpath><\u002Fmarker>\n      <\u002Fdefs>\n    <\u002Fsvg>\n    <div class=\"figcap\"><b>Fig. H<\u002Fb> &nbsp;·&nbsp; Three rungs. A question only climbs when the rung below it can't finish the job.<\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- role cards -->\n  <div class=\"threecol\" style=\"margin-top: 44px;\">\n    <!-- CoreS3 -->\n    <div class=\"mech\" style=\"border-color: var(--rust-soft);\">\n      <div class=\"head\" style=\"border-color: var(--rust-soft);\">\n        <h4>The front-end<\u002Fh4>\n        <span class=\"num\" style=\"color:var(--rust);\">TIER 1<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">M5Stack CoreS3 + LLM Module. An always-on desk terminal with a touchscreen, sips 1.5 W. It is a <em>reflex<\u002Fem>, not a brain.<\u002Fp>\n      <dl>\n        <dt>SoC<\u002Fdt><dd>AX630C · dual A53 @1.2 GHz<\u002Fdd>\n        <dt>NPU<\u002Fdt><dd>3.2 TOPS INT8<\u002Fdd>\n        <dt>Model<\u002Fdt><dd>Qwen2.5‑0.5B (on‑module)<\u002Fdd>\n        <dt>Owns<\u002Fdt><dd>the chat UI, trivial one‑line replies<\u002Fdd>\n        <dt>Escalates<\u002Fdt><dd>anything past a one‑liner → Pi #1<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"summary\" style=\"font-size:12.5px; color:var(--muted);\">Install the <code class=\"inline\">openai-api<\u002Fcode> StackFlow plugin so the module POSTs typed messages to the Pi as a normal chat request.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Orange Pi -->\n    <div class=\"mech\" style=\"border-color: var(--ochre-soft);\">\n      <div class=\"head\" style=\"border-color: var(--ochre-soft);\">\n        <h4>The brain &amp; router<\u002Fh4>\n        <span class=\"num\" style=\"color:var(--ochre);\">TIER 2<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">2× Orange Pi 5 Pro. This is the “local LLM” from the rest of this doc — host, router, and voice all live here.<\u002Fp>\n      <dl>\n        <dt>SoC<\u002Fdt><dd>RK3588S · octa‑core · 6 TOPS NPU<\u002Fdd>\n        <dt>Runtime<\u002Fdt><dd>RKLLama (NPU) — Ollama‑compatible API<\u002Fdd>\n        <dt>Model<\u002Fdt><dd>Qwen2.5‑7B, tool calling enabled<\u002Fdd>\n        <dt>Pi #1<\u002Fdt><dd>router + conversation owner<\u002Fdd>\n        <dt>Pi #2<\u002Fdt><dd>coder / Whisper / runs Claude Code<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"summary\" style=\"font-size:12.5px; color:var(--muted);\">RKLLama supports function calling for Qwen &amp; Llama‑3.2+, so the <code class=\"inline\">escalate_to_claude_code<\u002Fcode> tool from §02 works natively on the NPU.<\u002Fp>\n    <\u002Fdiv>\n\n    <!-- Claude -->\n    <div class=\"mech\" style=\"border-color: var(--petrol-soft);\">\n      <div class=\"head\" style=\"border-color: var(--petrol-soft);\">\n        <h4>The specialist<\u002Fh4>\n        <span class=\"num\" style=\"color:var(--petrol);\">TIER 3<\u002Fspan>\n      <\u002Fdiv>\n      <p class=\"summary\">Claude Code, reached only when Tier 2 calls the tool. The single hop that leaves your network.<\u002Fp>\n      <dl>\n        <dt>Runs<\u002Fdt><dd>headless on Pi #2, or a dev box<\u002Fdd>\n        <dt>Transport<\u002Fdt><dd>subprocess (M·01) or HTTP (M·04)<\u002Fdd>\n        <dt>Sees<\u002Fdt><dd>the §03 brief + a real git checkout<\u002Fdd>\n        <dt>Returns<\u002Fdt><dd>summary + diff via stream‑json<\u002Fdd>\n      <\u002Fdl>\n      <p class=\"summary\" style=\"font-size:12.5px; color:var(--muted);\">Because the Pi is arm64 Linux with Node, the <code class=\"inline\">claude<\u002Fcode> CLI can run <em>on the Pi itself<\u002Fem> — the orchestration stays local even though inference is cloud.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- the climb, concretely -->\n  <h3 class=\"sub\" style=\"margin-top: 48px; font-size:15px;\">The same question, climbing the ladder<\u002Fh3>\n  <div class=\"twocol\" style=\"gap:36px; margin-top: 14px;\">\n    <div>\n      <pre class=\"code\"><span class=\"lbl\">tier 1 · CoreS3 decides<\u002Fspan><span class=\"c\"># on-module, Qwen2.5-0.5B<\u002Fspan>\ntyped: <span class=\"s\">\"add rate limiting to the login route\"<\u002Fspan>\n\n<span class=\"c\"># 0.5B can't touch a repo → forward verbatim<\u002Fspan>\nPOST http://pi1.local:8000/v1/chat/completions\n  { <span class=\"n\">\"messages\"<\u002Fspan>: [{<span class=\"n\">\"role\"<\u002Fspan>:<span class=\"s\">\"user\"<\u002Fspan>,\n    <span class=\"n\">\"content\"<\u002Fspan>:<span class=\"s\">\"add rate limiting to the login route\"<\u002Fspan>}] }<\u002Fpre>\n      <p style=\"font-size:13px; margin-top:12px;\">If you'd typed “what time is it” or “clear the queue,” Tier 1 answers on its own screen — no climb.<\u002Fp>\n    <\u002Fdiv>\n    <div>\n      <pre class=\"code\"><span class=\"lbl\">tier 2 · Pi #1 routes (RKLLama, NPU)<\u002Fspan><span class=\"c\"># Qwen2.5-7B emits a tool call, not prose<\u002Fspan>\n{\n  <span class=\"n\">\"tool_call\"<\u002Fspan>: <span class=\"s\">\"escalate_to_claude_code\"<\u002Fspan>,\n  <span class=\"n\">\"arguments\"<\u002Fspan>: {\n    <span class=\"n\">\"goal\"<\u002Fspan>: <span class=\"s\">\"Add rate limiting to /login + a test\"<\u002Fspan>,\n    <span class=\"n\">\"why\"<\u002Fspan>:  <span class=\"s\">\"needs repo edits and a test run\"<\u002Fspan>,\n    <span class=\"n\">\"workdir\"<\u002Fspan>: <span class=\"s\">\"/srv/acme-api\"<\u002Fspan>\n  }\n}\n<span class=\"c\"># handler shells out on Pi #2:<\u002Fspan>\n$ ssh pi2 <span class=\"s\">'claude -p \"$(cat brief.md)\" \\<\u002Fspan>\n<span class=\"s\">    --output-format stream-json'<\u002Fspan><\u002Fpre>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"callout\" style=\"margin-top: 32px;\">The honest caveat: a 0.5B and a 7B are good at <em>knowing they're stuck<\u002Fem> and routing — they're not good at the hard task itself. That's exactly why the ladder exists. Keep Tier 1 &amp; 2 as routers with personality, and let Tier 3 do the work that needs to be correct.<\u002Fdiv>\n<\u002Fsection>\n\n<!-- ════════════════ §8 MODEL PICKS ════════════════ -->\n<section class=\"block\">\n  <div class=\"head-row\">\n    <span class=\"tag\">§ 08<\u002Fspan>\n    <span class=\"tag\">Which model on which box<\u002Fspan>\n  <\u002Fdiv>\n  <h2 class=\"section\" style=\"max-width:24ch;\"><span class=\"num\">I<\u002Fspan>Pick for the routing, not the coding.<\u002Fh2>\n  <p style=\"max-width:64ch;\">Counter‑intuitive, but central: in this pattern the local model never has to be a great programmer — <em>Claude Code is.<\u002Fem> The local model's real job is to recognise a coding task, <em>emit the escalation tool call cleanly,<\u002Fem> and write a faithful §03 brief. So rank candidates in this order:<\u002Fp>\n  <ul class=\"bullets\" style=\"margin-top:8px;\">\n    <li><b>Tool‑calling reliability<\u002Fb> — does it emit valid function calls every time? RKLLama lists <em>Qwen and Llama‑3.2+<\u002Fem> as the formats with complete tool‑call support, which all but decides this.<\u002Fli>\n    <li><b>Instruction following<\u002Fb> — can it summarise the conversation into a clean brief and know when <em>not<\u002Fem> to escalate?<\u002Fli>\n    <li><b>Coding literacy<\u002Fb> — only enough to handle one‑line fixes and write a sensible brief. The hard edits leave the network.<\u002Fli>\n  <\u002Ful>\n\n  <div class=\"twocol\" style=\"margin-top: 44px; gap: 44px; align-items: start;\">\n    <!-- AX630C -->\n    <div>\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom: 4px;\">\n        <span class=\"pill rust\"><span class=\"dot\"><\u002Fspan>TIER 1 · M5Stack · AX630C<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:16px; margin: 12px 0 2px;\">Front‑end &amp; reflex<\u002Fh3>\n      <p style=\"font-size:13px; color:var(--muted); margin-bottom: 14px; max-width:46ch;\">AXERA‑format only, ~1 GB usable → hard cap around 1.5B. It mostly forwards, so favour the best <em>judge<\u002Fem>, not the best coder.<\u002Fp>\n      <div class=\"ranklist\">\n        <div class=\"rrow\">\n          <div class=\"rrank\">01<\u002Fdiv>\n          <div class=\"rname\">Qwen2.5‑1.5B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag pick\">Pick<\u002Fdiv>\n          <div class=\"rwhy\">Best instruction‑following at this size — sharpest at the “answer it myself vs. forward” call, and it knows code well enough to forward the right things.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\"><b>in apt repo<\u002Fb><\u002Fspan><span class=\"chip\">judge + forward<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">02<\u002Fdiv>\n          <div class=\"rname\">Llama‑3.2‑1B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag alt\">Alt<\u002Fdiv>\n          <div class=\"rwhy\">If you want the module itself to emit the forward <em>as<\u002Fem> a tool call rather than a plain POST. Slightly weaker reasoning than Qwen.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\"><b>in apt repo<\u002Fb><\u002Fspan><span class=\"chip\">native tool format<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">03<\u002Fdiv>\n          <div class=\"rname\">Qwen2.5‑0.5B<\u002Fdiv>\n          <div class=\"rtag alt\">Default<\u002Fdiv>\n          <div class=\"rwhy\">Ships on the module. Fine as a dumb pass‑through, but too small to judge trivial‑vs‑forward reliably.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\"><b>pre‑installed<\u002Fb><\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">—<\u002Fdiv>\n          <div class=\"rname\">deepseek‑r1‑distill‑qwen‑1.5B<\u002Fdiv>\n          <div class=\"rtag skip\">Skip here<\u002Fdiv>\n          <div class=\"rwhy\">A reasoner that “thinks out loud” — wrong shape for a snappy reflex terminal. Save reasoning for the Pi.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- RK3588S -->\n    <div>\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom: 4px;\">\n        <span class=\"pill\" style=\"border-color:var(--ochre);\"><span class=\"dot\" style=\"background:var(--ochre);\"><\u002Fspan>TIER 2 · Orange Pi · RK3588S<\u002Fspan>\n      <\u002Fdiv>\n      <h3 class=\"sub\" style=\"font-size:16px; margin: 12px 0 2px;\">Brain &amp; router — where Claude Code integration lives<\u002Fh3>\n      <p style=\"font-size:13px; color:var(--muted); margin-bottom: 14px; max-width:46ch;\">16 GB, rkllm/NPU. This box owns the <code class=\"inline\">escalate_to_claude_code<\u002Fcode> tool, so tool‑calling reliability is everything. ~3–7 t/s at 7B.<\u002Fp>\n      <div class=\"ranklist\">\n        <div class=\"rrow\">\n          <div class=\"rrank\">01<\u002Fdiv>\n          <div class=\"rname\">Qwen2.5‑Coder‑7B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag pick o\">Pick · Pi #1<\u002Fdiv>\n          <div class=\"rwhy\">The host/router. Best blend of Qwen tool‑calling + real coding sense, so it both fires the escalation reliably <em>and<\u002Fem> writes a brief that reads like an engineer wrote it.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\"><b>rk3588 w8a8<\u002Fb><\u002Fspan><span class=\"chip\">tool calling<\u002Fspan><span class=\"chip\">~3–7 t/s<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">02<\u002Fdiv>\n          <div class=\"rname\">Qwen2.5‑Coder‑3B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag pick o\">Pick · Pi #2<\u002Fdiv>\n          <div class=\"rwhy\">The worker. Fast enough for second‑opinion passes and trivial edits before anything pays for the cloud; keeps Pi #1 free to host.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\"><b>rk3588 w8a8<\u002Fb><\u002Fspan><span class=\"chip\">~5–8 t/s<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">03<\u002Fdiv>\n          <div class=\"rname\">Qwen2.5‑7B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag alt\">Alt<\u002Fdiv>\n          <div class=\"rwhy\">Swap in if your front‑end traffic is more general chat than code. Same tool‑calling, broader knowledge, a touch less code fluency.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\">tool calling<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">04<\u002Fdiv>\n          <div class=\"rname\">Llama‑3.2‑3B <span class=\"sz\">Instruct<\u002Fspan><\u002Fdiv>\n          <div class=\"rtag alt\">Fallback<\u002Fdiv>\n          <div class=\"rwhy\">The non‑Qwen safety net — also a supported tool‑call format in RKLLama. Reach for it only if a Qwen build misbehaves at function calling.<\u002Fdiv>\n          <div class=\"rmeta\"><span class=\"chip\">tool calling<\u002Fspan><span class=\"chip\">lighter<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"rrow\">\n          <div class=\"rrank\">—<\u002Fdiv>\n          <div class=\"rname\">deepseek‑coder‑7B<\u002Fdiv>\n          <div class=\"rtag skip\">Niche<\u002Fdiv>\n          <div class=\"rwhy\">Strong at raw completion, weaker at instruction‑following / tool calls. Good as a local autocomplete worker, poor as the router.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- recommended stack -->\n  <div style=\"margin-top: 48px; background: var(--paper-2); border-radius: 4px; padding: 30px 30px 26px;\">\n    <h3 class=\"sub\" style=\"font-size:13px; letter-spacing:0.14em; text-transform:uppercase; color:var(--muted); margin-bottom: 20px;\">Recommended stack — Qwen2.5 the whole way up<\u002Fh3>\n    <div class=\"fourcol\" style=\"gap:0; align-items:stretch;\">\n      <div style=\"padding-right:24px; border-right:1px solid var(--rule);\">\n        <div class=\"rrank\" style=\"margin-bottom:6px;\">TIER 1 · CoreS3<\u002Fdiv>\n        <div class=\"rname\" style=\"font-size:15px; line-height:1.3;\">Qwen2.5‑1.5B<\u002Fdiv>\n        <p style=\"font-size:12.5px; color:var(--ink-2); margin:8px 0 0;\">judges trivial‑vs‑forward, runs the touchscreen UI<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:0 24px; border-right:1px solid var(--rule);\">\n        <div class=\"rrank\" style=\"margin-bottom:6px;\">TIER 2 · Pi #1<\u002Fdiv>\n        <div class=\"rname\" style=\"font-size:15px; line-height:1.3;\">Qwen2.5‑Coder‑7B<\u002Fdiv>\n        <p style=\"font-size:12.5px; color:var(--ink-2); margin:8px 0 0;\">router + host; owns the escalate tool and writes the brief<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"padding:0 24px; border-right:1px solid var(--rule);\">\n        <div class=\"rrank\" style=\"margin-bottom:6px;\">TIE
